<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Caminho - Artigo</title>
    
    <!-- Tags PWA para instalação no telemóvel (Caminhos absolutos) -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e40af">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --theme-start: #1e40af;
            --theme-end: #3b82f6;
            --theme-text-accent: #2563eb;
            --theme-bg-light: #bfdbfe; 
        }

        /* O tamanho da fonte no html controla tudo o que usa 'rem' no Tailwind */
        html {
            font-size: 16px;
            transition: font-size 0.3s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(to bottom, var(--theme-bg-light) 0%, #ffffff 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--theme-start) 0%, var(--theme-end) 100%);
            transition: background 0.4s ease;
        }

        .article-body p {
            margin-bottom: 1.5em;
            line-height: 1.8;
            color: #374151;
        }
        
        /* Estilo para a notificação de cópia (Toast) */
        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(31, 41, 55, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body class="max-w-md mx-auto shadow-2xl relative pb-10">

    <!-- ESQUELETO VISUAL (Glow Theme Contour) -->
    <div class="fixed top-[12px] bottom-[12px] left-1/2 -translate-x-1/2 w-[calc(100%-24px)] max-w-[calc(28rem-24px)] pointer-events-none z-0 rounded-[2.5rem]" 
         style="border: 2px solid var(--theme-start); box-shadow: 0 0 15px var(--theme-start); opacity: 0.45;">
    </div>
    
    <!-- PONTOS DE LUZ DO ESQUELETO (Adaptado para o Blog) -->
    <div class="fixed top-0 bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md pointer-events-none z-0">
        <div class="absolute top-[30px] left-[18px] w-1.5 h-1.5 bg-white rounded-full opacity-90" style="box-shadow: 0 0 10px 4px var(--theme-start);"></div>
        <div class="absolute top-[30px] right-[18px] w-1.5 h-1.5 bg-white rounded-full opacity-90" style="box-shadow: 0 0 10px 4px var(--theme-start);"></div>
        <div class="absolute top-[105px] left-1/2 w-2 h-2 bg-white rounded-full opacity-90 -translate-x-1/2" style="box-shadow: 0 0 12px 5px var(--theme-start);"></div>
        <div class="absolute top-1/2 left-[12px] w-1.5 h-1.5 bg-white rounded-full opacity-70 -translate-y-1/2" style="box-shadow: 0 0 10px 3px var(--theme-start);"></div>
        <div class="absolute top-1/2 right-[12px] w-1.5 h-1.5 bg-white rounded-full opacity-70 -translate-y-1/2" style="box-shadow: 0 0 10px 3px var(--theme-start);"></div>
        <div class="absolute bottom-[12px] left-1/2 w-2 h-2 bg-white rounded-full opacity-90 -translate-x-1/2" style="box-shadow: 0 0 12px 5px var(--theme-start);"></div>
    </div>

    <!-- Cabeçalho "ARTIGOS" -->
    <header class="gradient-bg text-white p-6 rounded-b-[2.5rem] shadow-lg relative z-10 mb-8">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-bold">ARTIGOS</h1>
                <p class="text-white/80 text-sm mt-1">O Caminho - Estudo da Palavra</p>
            </div>
            <div class="flex gap-4 items-center">
                <!-- Rota Limpa para a Página Inicial -->
                <a href="/" class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-colors shrink-0 cursor-pointer text-white" title="Voltar ao Feed">
                    <i class="fas fa-arrow-left text-lg pointer-events-none"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="px-6 relative z-10" id="article-container">
        <!-- Loader -->
        <div id="loader" class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[var(--theme-text-accent)]"></div>
        </div>
    </main>

    <!-- Contentor para o Toast de Cópia de Link -->
    <div id="copy-toast" class="toast-msg">Link copiado com sucesso!</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW falhou', err));
            });
        }

        try {
            const savedTheme = localStorage.getItem('user_theme_pref');
            const savedFont = localStorage.getItem('user_font_pref');
            
            if (savedFont) document.documentElement.style.fontSize = savedFont + 'px';
            
            const themes = {
                blue: { start: '#1e40af', end: '#3b82f6', accent: '#2563eb', light: '#bfdbfe' },
                green: { start: '#14532d', end: '#22c55e', accent: '#16a34a', light: '#bbf7d0' },
                red: { start: '#7f1d1d', end: '#ef4444', accent: '#dc2626', light: '#fecaca' },
                coffee: { start: '#3e2723', end: '#8d6e63', accent: '#6d4c41', light: '#d6d3d1' },
                petrol: { start: '#083344', end: '#0891b2', accent: '#0e7490', light: '#a5f3fc' },
                light: { start: '#475569', end: '#94a3b8', accent: '#64748b', light: '#e2e8f0' },
                pollen: { start: '#78350f', end: '#f59e0b', accent: '#d97706', light: '#fde68a' }
            };

            if (savedTheme && themes[savedTheme]) {
                const theme = themes[savedTheme];
                document.documentElement.style.setProperty('--theme-start', theme.start);
                document.documentElement.style.setProperty('--theme-end', theme.end);
                document.documentElement.style.setProperty('--theme-text-accent', theme.accent);
                document.documentElement.style.setProperty('--theme-bg-light', theme.light);
            }
        } catch(e) {}

        const firebaseConfig = {
            apiKey: "AIzaSyCW_Hjw1HAXu2pyPIYjtqPCQHsQ-WhZehs",
            authDomain: "licoes-de-vida-plena.firebaseapp.com",
            projectId: "licoes-de-vida-plena",
            storageBucket: "licoes-de-vida-plena.firebasestorage.app",
            messagingSenderId: "814651383731",
            appId: "1:814651383731:web:136a823c6d6c61e350f5c6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.copyArticleLink = () => {
            const url = window.location.href;
            try {
                const textArea = document.createElement("textarea");
                textArea.value = url;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                document.execCommand("copy");
                textArea.remove();
                
                const toast = document.getElementById('copy-toast');
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 3000);
            } catch (err) {
                console.error("Falha ao copiar:", err);
            }
        };

        window.activateVideo = (overlayElement, videoId, isYoutube, elementId) => {
            if(window.event) {
                window.event.preventDefault();
                window.event.stopPropagation();
            }
            overlayElement.style.display = 'none';
            const mediaEl = document.getElementById(elementId);
            
            if (mediaEl && isYoutube) {
                mediaEl.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&controls=1&playsinline=1`;
                mediaEl.classList.remove('pointer-events-none', 'scale-[1.05]');
            } else if (mediaEl) {
                mediaEl.muted = false;
                mediaEl.controls = true;
                mediaEl.classList.remove('pointer-events-none');
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Erro na autenticação:", error);
            }
        };

        async function loadArticle() {
            const container = document.getElementById('article-container');
            
            if (!postId) {
                container.innerHTML = `<p class="text-center text-gray-500 mt-10">Artigo não encontrado. ID não fornecido.</p>`;
                return;
            }

            await initAuth();

            if (!auth.currentUser) {
                container.innerHTML = `<p class="text-center text-red-500 mt-10">Erro de permissão: Falha ao conectar-se ao servidor.</p>`;
                return;
            }

            try {
                const docRef = doc(db, 'artifacts', 'licoes-de-vida-plena', 'public', 'data', 'posts', postId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const post = docSnap.data();
                    document.title = post.title + " - O Caminho";

                    let mediaHtml = '';
                    const mediaId = 'main-vid';
                    
                    if (post.mediaUrl) {
                        let url = post.mediaUrl;
                        let isVideo = false;
                        let embedUrl = '';
                        let ytVideoId = '';
                        
                        const ytMatch = url.match(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/)|youtu\.be\/)([\w-]{11})/);
                        if (ytMatch) {
                            isVideo = true;
                            ytVideoId = ytMatch[1];
                            embedUrl = `https://www.youtube.com/embed/${ytVideoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${ytVideoId}&playsinline=1`;
                        } else {
                            const gdMatch1 = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                            const gdMatch2 = url.match(/id=([a-zA-Z0-9_-]+)/);
                            let gdId = gdMatch1 ? gdMatch1[1] : (gdMatch2 ? gdMatch2[1] : null);
                            if (gdId) url = `https://lh3.googleusercontent.com/d/${gdId}`;
                        }

                        if (isVideo) {
                            mediaHtml = `
                                <div class="relative w-full aspect-video rounded-2xl overflow-hidden mb-8 shadow-sm border border-gray-100 bg-black">
                                    <iframe id="${mediaId}" src="${embedUrl}" class="w-full h-full pointer-events-none scale-[1.05]" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                                    <div class="absolute inset-0 flex items-center justify-center cursor-pointer z-10 bg-black/20 hover:bg-black/10 transition-colors" onclick="activateVideo(this, '${ytVideoId}', true, '${mediaId}')">
                                        <i class="fas fa-play text-white text-5xl opacity-70 drop-shadow-lg hover:scale-110 transition-transform"></i>
                                    </div>
                                </div>
                            `;
                        } else {
                            mediaHtml = `<img src="${url}" class="w-full aspect-video object-cover object-center rounded-2xl mb-8 shadow-sm border border-gray-100" onerror="this.style.display='none'">`;
                        }
                    }

                    let articleContent = post.content || '';
                    const inlineYtRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/)|youtu\.be\/)([\w-]{11})/g;
                    
                    let vidCounter = 0;
                    articleContent = articleContent.replace(inlineYtRegex, (match, videoId) => {
                        vidCounter++;
                        const inlineVidId = `inline-vid-${vidCounter}`;
                        const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&controls=0&loop=1&playlist=${videoId}&playsinline=1`;
                        return `
                            <div class="relative w-full aspect-video rounded-2xl overflow-hidden my-6 shadow-sm border border-gray-100 bg-black block">
                                <iframe id="${inlineVidId}" src="${embedUrl}" class="w-full h-full pointer-events-none scale-[1.05]" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
                                <div class="absolute inset-0 flex items-center justify-center cursor-pointer z-10 bg-black/20 hover:bg-black/10 transition-colors" onclick="activateVideo(this, '${videoId}', true, '${inlineVidId}')">
                                    <i class="fas fa-play text-white text-5xl opacity-70 drop-shadow-lg hover:scale-110 transition-transform"></i>
                                </div>
                            </div>
                        `;
                    });

                    container.innerHTML = `
                        <div class="mb-8">
                            <h1 class="text-3xl font-bold mb-6 text-gray-900 leading-tight">${post.title}</h1>
                            ${mediaHtml}
                            <article class="article-body whitespace-pre-wrap">${articleContent}</article>
                        </div>
                        
                        <div class="pt-6 border-t border-gray-300/50 flex items-center justify-between px-2">
                            <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">O Caminho</span>
                            <button onclick="copyArticleLink()" class="text-[var(--theme-text-accent)] bg-white/60 backdrop-blur-sm shadow-sm border border-white px-4 py-2 rounded-full text-xs font-bold transition-colors hover:bg-white cursor-pointer">
                                <i class="fas fa-share-alt mr-1"></i> Partilhar
                            </button>
                        </div>
                    `;
                } else {
                    container.innerHTML = `<p class="text-center text-gray-500 mt-10">Este artigo não existe mais ou foi removido.</p>`;
                }
            } catch (error) {
                console.error("Erro ao procurar artigo:", error);
                container.innerHTML = `<p class="text-center text-red-500 mt-10">Houve um erro ao carregar a leitura. Verifique sua conexão.</p>`;
            }
        }

        loadArticle();
    </script>
</body>
</html>
