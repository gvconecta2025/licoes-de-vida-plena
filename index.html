<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O Caminho</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --theme-start: #1e40af;
            --theme-end: #3b82f6;
            --theme-text-accent: #2563eb;
            --base-font-size: 16px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            font-size: var(--base-font-size);
        }

        .active-tab {
            color: var(--theme-text-accent);
            border-bottom: 3px solid var(--theme-text-accent);
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--theme-start) 0%, var(--theme-end) 100%);
            transition: background 0.4s ease;
        }

        .theme-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .theme-dot:active {
            transform: scale(0.9);
        }

        /* Esconder scrollbar mas manter funcionalidade */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .settings-panel {
            transition: transform 0.3s ease-in-out;
        }

        @keyframes slide-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up {
            animation: slide-up 0.3s ease-out;
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen shadow-2xl bg-white relative pb-24">

    <!-- Header -->
    <header class="gradient-bg text-white p-6 rounded-b-[2.5rem] shadow-lg relative z-10">
        <div class="flex justify-between items-center mb-4">
            <div>
                <h1 class="text-2xl font-bold">O Caminho</h1>
                <p class="text-white/80 text-sm mt-1">Seu espaço de estudo e reflexão.</p>
            </div>
            <div class="flex gap-4 items-center">
                <!-- Botão de Configurações (Engrenagem) -->
                <button onclick="toggleSettings()" class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-colors shrink-0 cursor-pointer">
                    <i class="fas fa-cog text-lg pointer-events-none"></i>
                </button>
                <!-- Foto do Professor (Em avatar com fundo sólido branco para esconder problemas de transparência) -->
                <div class="w-12 h-12 rounded-full overflow-hidden bg-white shadow-md border-2 border-white shrink-0 flex items-center justify-center">
                    <img src="professor.png" alt="Professor" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=150&q=80'">
                </div>
            </div>
        </div>
    </header>

    <!-- Painel de Configurações (Overlay) -->
    <div id="settings-panel" class="fixed inset-0 bg-black/40 z-[100] hidden items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-8 shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">Configurações</h3>
                <button onclick="toggleSettings()" class="text-gray-400 hover:text-gray-600 cursor-pointer p-2">
                    <i class="fas fa-times text-xl pointer-events-none"></i>
                </button>
            </div>

            <!-- Seleção de Cores -->
            <div class="mb-8">
                <p class="text-sm font-semibold text-gray-500 mb-4 uppercase tracking-wider">Cor do Tema</p>
                <div class="flex flex-wrap gap-4">
                    <div onclick="setTheme('blue')" class="theme-dot bg-blue-600"></div>
                    <div onclick="setTheme('green')" class="theme-dot bg-green-600"></div>
                    <div onclick="setTheme('red')" class="theme-dot bg-red-600"></div>
                    <div onclick="setTheme('coffee')" class="theme-dot" style="background-color: #5d4037;"></div>
                    <div onclick="setTheme('petrol')" class="theme-dot bg-cyan-800"></div>
                    <div onclick="setTheme('light')" class="theme-dot bg-slate-400"></div>
                    <div onclick="setTheme('pollen')" class="theme-dot bg-amber-500"></div>
                </div>
            </div>

            <!-- Seleção de Fonte -->
            <div class="mb-6">
                <p class="text-sm font-semibold text-gray-500 mb-4 uppercase tracking-wider">Tamanho da Fonte</p>
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded-2xl">
                    <button onclick="setFontSize(14)" class="flex-1 py-3 text-sm font-medium rounded-xl hover:bg-white transition-all font-btn cursor-pointer" data-size="14">Pequeno</button>
                    <button onclick="setFontSize(16)" class="flex-1 py-3 text-base font-medium rounded-xl hover:bg-white transition-all font-btn bg-white shadow-sm cursor-pointer" data-size="16">Médio</button>
                    <button onclick="setFontSize(20)" class="flex-1 py-3 text-lg font-medium rounded-xl hover:bg-white transition-all font-btn cursor-pointer" data-size="20">Grande</button>
                </div>
            </div>
            
            <button onclick="toggleSettings()" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg mt-4 cursor-pointer hover:opacity-90">Pronto</button>
        </div>
    </div>

    <!-- Main Content Area -->
    <main id="app-content" class="p-5">
        <div id="loader" class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>

        <section id="view-home" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-800">Reflexões Diárias</h2>
            <div id="feed-container" class="space-y-4"></div>
        </section>

        <!-- View: Livros -->
        <section id="view-books" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">E-books de Fé</h2>
                <button onclick="checkAccess()" class="text-xs font-semibold text-blue-600 bg-blue-50 px-4 py-2 rounded-full btn-accent-text hover:bg-blue-100 transition-colors cursor-pointer">Validar Acesso</button>
            </div>
            <div id="books-container" class="grid grid-cols-2 gap-4"></div>
        </section>

        <!-- View: Cursos -->
        <section id="view-courses" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-800">Formação Teológica</h2>
            <div id="courses-container" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
        <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center gap-1 transition-all active-tab nav-btn cursor-pointer p-2 w-full">
            <i class="fas fa-hands-praying text-xl pointer-events-none"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider pointer-events-none mt-1">Início</span>
        </button>
        <button onclick="switchTab('books')" id="nav-books" class="flex flex-col items-center gap-1 transition-all text-gray-400 nav-btn cursor-pointer p-2 w-full">
            <i class="fas fa-book-bible text-xl pointer-events-none"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider pointer-events-none mt-1">Estante</span>
        </button>
        <button onclick="switchTab('courses')" id="nav-courses" class="flex flex-col items-center gap-1 transition-all text-gray-400 nav-btn cursor-pointer p-2 w-full">
            <i class="fas fa-chalkboard-user text-xl pointer-events-none"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider pointer-events-none mt-1">Cursos</span>
        </button>
    </nav>

    <!-- Modal de Validação -->
    <div id="email-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-[60]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <i class="fas fa-envelope-open-text text-blue-600 text-4xl mb-4 icon-accent"></i>
            <h3 class="text-xl font-bold mb-2">Acesso aos Livros</h3>
            <p class="text-gray-500 text-sm mb-6">Insira o e-mail cadastrado para baixar suas obras de estudo.</p>
            <input type="email" id="user-email" placeholder="seu@email.com" class="w-full border p-3 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 text-center">
            <button onclick="validateEmail()" class="w-full gradient-bg text-white font-bold py-3 rounded-xl shadow-lg cursor-pointer hover:opacity-90">Liberar Acesso</button>
            <button onclick="closeModal()" class="mt-4 text-gray-400 text-sm cursor-pointer p-2 font-semibold">Voltar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, query, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. SAFE STORAGE WRAPPER (Impede que SecurityErrors quebrem os botões)
        const safeStorage = {
            getItem(key) {
                try { return localStorage.getItem(key); } catch (e) { return null; }
            },
            setItem(key, value) {
                try { localStorage.setItem(key, value); } catch (e) { console.warn("Storage bloqueado", e); }
            }
        };

        // 2. ESTADOS E DADOS
        let currentUser = null;
        let db = null;
        let appId = null;
        let userEmailAccess = safeStorage.getItem('educator_email_access') || null;

        const themes = {
            blue: { start: '#1e40af', end: '#3b82f6', accent: '#2563eb' },
            green: { start: '#14532d', end: '#22c55e', accent: '#16a34a' },
            red: { start: '#7f1d1d', end: '#ef4444', accent: '#dc2626' },
            coffee: { start: '#3e2723', end: '#8d6e63', accent: '#6d4c41' },
            petrol: { start: '#083344', end: '#0891b2', accent: '#0e7490' },
            light: { start: '#475569', end: '#94a3b8', accent: '#64748b' },
            pollen: { start: '#78350f', end: '#f59e0b', accent: '#d97706' }
        };

        const mockFeed = [
            { id: 1, title: "A Força da Oração", content: "Estudo sobre como a oração constante transforma o ambiente ao nosso redor...", img: "https://images.unsplash.com/photo-1507692049790-de58290a4334?auto=format&fit=crop&w=400&q=80" },
            { id: 2, title: "Parábolas Comentadas", content: "Uma análise profunda sobre a parábola do semeador e seus frutos hoje.", img: "https://images.unsplash.com/photo-1490730141103-6ca3d7d6cf70?auto=format&fit=crop&w=400&q=80" }
        ];

        const mockBooks = [
            { id: 1, title: "Fundamentos da Fé", author: "Educador de Fé", cover: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=400&q=80", link: "https://seulinkdevendas.com/livro1" },
            { id: 2, title: "História do Cristianismo", author: "M. Oliveira", cover: "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400&q=80", link: "https://seulinkdevendas.com/livro2" }
        ];

        const mockCourses = [
            { id: 1, title: "Teologia para Todos", price: "R$ 147,00", cover: "https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&w=400&q=80", link: "https://hotmart.com" },
            { id: 2, title: "Hermenêutica Avançada", price: "R$ 297,00", cover: "https://images.unsplash.com/photo-1532012197367-280696590650?auto=format&fit=crop&w=400&q=80", link: "https://hotmart.com" }
        ];

        // 3. FUNÇÕES GLOBAIS DE INTERFACE
        window.toggleSettings = () => {
            const panel = document.getElementById('settings-panel');
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                panel.classList.add('flex');
            } else {
                panel.classList.add('hidden');
                panel.classList.remove('flex');
            }
        };

        window.setTheme = (themeName) => {
            const theme = themes[themeName];
            document.documentElement.style.setProperty('--theme-start', theme.start);
            document.documentElement.style.setProperty('--theme-end', theme.end);
            document.documentElement.style.setProperty('--theme-text-accent', theme.accent);
            
            document.querySelectorAll('.btn-accent-text').forEach(el => el.style.color = theme.accent);
            document.querySelectorAll('.icon-accent').forEach(el => el.style.color = theme.accent);
            
            safeStorage.setItem('user_theme_pref', themeName);
        };

        window.setFontSize = (size) => {
            document.documentElement.style.setProperty('--base-font-size', size + 'px');
            safeStorage.setItem('user_font_pref', size);
            
            document.querySelectorAll('.font-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm');
                if(parseInt(btn.getAttribute('data-size')) === size) {
                    btn.classList.add('bg-white', 'shadow-sm');
                }
            });
        };

        window.switchTab = (tab) => {
            ['home', 'books', 'courses'].forEach(t => {
                const view = document.getElementById(`view-${t}`);
                const nav = document.getElementById(`nav-${t}`);
                if(view) view.classList.add('hidden');
                if(nav) {
                    nav.classList.remove('active-tab');
                    nav.classList.add('text-gray-400');
                }
            });
            const activeView = document.getElementById(`view-${tab}`);
            const activeNav = document.getElementById(`nav-${tab}`);
            
            if(activeView) activeView.classList.remove('hidden');
            if(activeNav) {
                activeNav.classList.add('active-tab');
                activeNav.classList.remove('text-gray-400');
            }

            if (tab === 'home') renderHome();
            if (tab === 'books') renderBooks();
            if (tab === 'courses') renderCourses();
            
            // Rolar para o topo suavemente ao trocar de aba
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.checkAccess = () => {
            document.getElementById('email-modal').classList.remove('hidden');
            document.getElementById('email-modal').classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
        };

        // Fallback da função de email caso Firebase falhe
        window.validateEmail = () => {
            const email = document.getElementById('user-email').value;
            if (!email.includes('@')) return;
            safeStorage.setItem('educator_email_access', email);
            userEmailAccess = email;
            closeModal();
            renderBooks();
        };

        // 4. FUNÇÕES DE RENDERIZAÇÃO DA TELA
        function renderHome() {
            const container = document.getElementById('feed-container');
            if(!container) return;
            container.innerHTML = mockFeed.map(post => `
                <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm transition-transform active:scale-[0.98]">
                    <img src="${post.img}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-gray-800">${post.title}</h3>
                        <p class="text-gray-500 text-sm mt-1 line-clamp-2">${post.content}</p>
                        <button onclick="switchTab('courses')" class="mt-3 text-[var(--theme-text-accent)] font-semibold text-sm cursor-pointer hover:underline">Continuar estudo <i class="fas fa-arrow-right ml-1"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderBooks() {
            const container = document.getElementById('books-container');
            if(!container) return;
            container.innerHTML = mockBooks.map(book => `
                <div class="relative group cursor-pointer flex flex-col h-full">
                    <a href="${book.link}" target="_blank" class="block aspect-[3/4] bg-gray-100 rounded-2xl overflow-hidden shadow-md relative shrink-0">
                        <img src="${book.cover}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                        ${!userEmailAccess ? '<div class="absolute inset-0 bg-black/40 backdrop-blur-[2px] flex items-center justify-center"><i class="fas fa-lock text-white text-2xl drop-shadow-md"></i></div>' : ''}
                    </a>
                    <div class="mt-3 flex flex-col flex-1 justify-between">
                        <div>
                            <p class="font-bold text-sm text-gray-800 line-clamp-2 leading-tight">${book.title}</p>
                            <p class="text-[10px] text-gray-400 mt-1 mb-3">${book.author}</p>
                        </div>
                        ${userEmailAccess 
                            ? `<a href="${book.link}" target="_blank" class="w-full block text-center bg-green-50 text-green-600 text-[10px] py-2.5 rounded-lg font-bold uppercase transition-colors hover:bg-green-100">Baixar PDF</a>` 
                            : `<a href="${book.link}" target="_blank" class="w-full block text-center bg-blue-50 text-[var(--theme-text-accent)] text-[10px] py-2.5 rounded-lg font-bold uppercase transition-colors hover:bg-blue-100 btn-accent-text">Página de Vendas</a>`}
                    </div>
                </div>
            `).join('');
        }

        function renderCourses() {
            const container = document.getElementById('courses-container');
            if(!container) return;
            container.innerHTML = mockCourses.map(course => `
                <div class="relative group cursor-pointer flex flex-col h-full">
                    <a href="${course.link}" target="_blank" class="block aspect-[3/4] bg-gray-100 rounded-2xl overflow-hidden shadow-md relative shrink-0">
                        <img src="${course.cover}" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-3 pt-8">
                            <p class="text-white font-bold text-xs"><i class="fas fa-tag mr-1"></i> ${course.price}</p>
                        </div>
                    </a>
                    <div class="mt-3 flex flex-col flex-1 justify-between">
                        <p class="font-bold text-sm text-gray-800 line-clamp-2 leading-tight mb-3">${course.title}</p>
                        <a href="${course.link}" target="_blank" class="w-full block text-center bg-blue-50 text-[var(--theme-text-accent)] text-[10px] py-2.5 rounded-lg font-bold uppercase transition-colors hover:bg-blue-100 btn-accent-text">Página de Vendas</a>
                    </div>
                </div>
            `).join('');
        }

        // 5. INICIALIZAÇÃO SEGURA DA UI
        try {
            const savedTheme = safeStorage.getItem('user_theme_pref') || 'blue';
            const savedFont = parseInt(safeStorage.getItem('user_font_pref')) || 16;
            window.setTheme(savedTheme);
            window.setFontSize(savedFont);
            
            renderHome();
            const loader = document.getElementById('loader');
            if(loader) loader.classList.add('hidden');
            window.switchTab('home');
        } catch (err) {
            console.error("Erro Crítico na UI:", err);
        }

        // 6. INICIALIZAÇÃO DO FIREBASE (Completamente isolada)
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

                // Sobrescreve função de validar com lógica do Firebase
                window.validateEmail = async () => {
                    const email = document.getElementById('user-email').value;
                    if (!email.includes('@')) return;

                    try {
                        if (currentUser && db) {
                            const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings');
                            await setDoc(userRef, { email: email, validated: true }, { merge: true });
                        }
                        safeStorage.setItem('educator_email_access', email);
                        userEmailAccess = email;
                        closeModal();
                        renderBooks();
                    } catch (err) {
                        console.error("Aviso Firebase:", err);
                        // Sucesso mesmo offline
                        safeStorage.setItem('educator_email_access', email);
                        userEmailAccess = email;
                        closeModal();
                        renderBooks();
                    }
                };

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };

                onAuthStateChanged(auth, (user) => {
                    currentUser = user;
                    renderBooks(); // Atualiza layout pós login
                });

                initAuth();
            }
        } catch (e) {
            console.error("Modo Offline Ativado (Firebase não injetado):", e);
        }
    </script>
</body>
</html>
