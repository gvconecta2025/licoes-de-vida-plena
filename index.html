<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educador Digital - Plataforma de Ensino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .active-tab {
            color: #2563eb;
            border-bottom: 3px solid #2563eb;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
        }

        /* Esconder scrollbar mas manter funcionalidade */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen shadow-2xl bg-white relative pb-20">

    <!-- Header / Perfil -->
    <header class="gradient-bg text-white p-6 rounded-b-[2.5rem] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold">Olá, Estudante!</h1>
                <p class="text-blue-100 text-sm">Bem-vindo ao seu espaço de aprendizado.</p>
            </div>
            <div class="w-12 h-12 rounded-full border-2 border-white overflow-hidden bg-white/20 flex items-center justify-center">
                <i class="fas fa-user text-xl"></i>
            </div>
        </div>
        
        <!-- Busca Rápida -->
        <div class="relative">
            <input type="text" placeholder="O que você quer aprender hoje?" class="w-full py-3 px-11 rounded-2xl text-gray-800 focus:outline-none shadow-inner">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="p-5">
        <!-- Loader inicial -->
        <div id="loader" class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>

        <!-- View: Feed (Home) -->
        <section id="view-home" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-800">Destaques da Semana</h2>
            <div id="feed-container" class="space-y-4">
                <!-- Posts injetados via JS -->
            </div>
        </section>

        <!-- View: Livros (Estante) -->
        <section id="view-books" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">Meus E-books</h2>
                <button onclick="checkAccess()" class="text-xs font-semibold text-blue-600 bg-blue-50 px-3 py-1 rounded-full">Validar Acesso</button>
            </div>
            <div id="books-container" class="grid grid-cols-2 gap-4">
                <!-- Livros injetados via JS -->
            </div>
        </section>

        <!-- View: Cursos -->
        <section id="view-courses" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-800">Cursos na Hotmart</h2>
            <div id="courses-container" class="space-y-4">
                <!-- Cursos injetados via JS -->
            </div>
        </section>
    </main>

    <!-- Navigation Bar (Estilo Mobile na Imagem) -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
        <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center gap-1 transition-all active-tab">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Início</span>
        </button>
        <button onclick="switchTab('books')" id="nav-books" class="flex flex-col items-center gap-1 transition-all text-gray-400">
            <i class="fas fa-book-open text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Livros</span>
        </button>
        <button onclick="switchTab('courses')" id="nav-courses" class="flex flex-col items-center gap-1 transition-all text-gray-400">
            <i class="fas fa-graduation-cap text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Cursos</span>
        </button>
    </nav>

    <!-- Modal de Validação de Email -->
    <div id="email-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-[60]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <i class="fas fa-lock text-blue-600 text-4xl mb-4"></i>
            <h3 class="text-xl font-bold mb-2">Acesso Restrito</h3>
            <p class="text-gray-500 text-sm mb-6">Insira o e-mail que você usou na compra para liberar seus livros.</p>
            <input type="email" id="user-email" placeholder="seu@email.com" class="w-full border p-3 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 text-center">
            <button onclick="validateEmail()" class="w-full gradient-bg text-white font-bold py-3 rounded-xl shadow-lg">Liberar Acesso</button>
            <button onclick="closeModal()" class="mt-4 text-gray-400 text-sm">Cancelar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, query, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuração Firebase do Ambiente
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let userEmailAccess = localStorage.getItem('educator_email_access') || null;

        // Dados estáticos de exemplo (Seriam carregados do Firebase no futuro)
        const mockFeed = [
            { id: 1, title: "A importância da leitura", content: "Ler expande horizontes e abre portas para o conhecimento infinito...", img: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?auto=format&fit=crop&w=400&q=80" },
            { id: 2, title: "Novo Curso Lançado!", content: "O curso de Estratégias de Aprendizado já está disponível na Hotmart.", img: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=400&q=80" }
        ];

        const mockBooks = [
            { id: 1, title: "Pedagogia Moderna", author: "Dr. Silva", cover: "https://images.unsplash.com/photo-1589998059171-988d887df646?auto=format&fit=crop&w=400&q=80", link: "#" },
            { id: 2, title: "Educação 5.0", author: "Ana Souza", cover: "https://images.unsplash.com/photo-1532012197367-280696590650?auto=format&fit=crop&w=400&q=80", link: "#" }
        ];

        const mockCourses = [
            { id: 1, title: "Mestre da Didática", price: "R$ 197,00", link: "https://hotmart.com" },
            { id: 2, title: "Escola Digital Pro", price: "R$ 497,00", link: "https://hotmart.com" }
        ];

        // Inicialização de Autenticação (REGRA 3)
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                console.log("Autenticado como:", user.uid);
                renderHome();
                document.getElementById('loader').classList.add('hidden');
                switchTab('home');
            }
        });

        // Navegação entre abas
        window.switchTab = (tab) => {
            // Esconde todas
            ['home', 'books', 'courses'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('active-tab');
                document.getElementById(`nav-${t}`).classList.add('text-gray-400');
            });

            // Mostra a selecionada
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active-tab');
            document.getElementById(`nav-${tab}`).classList.remove('text-gray-400');

            if (tab === 'home') renderHome();
            if (tab === 'books') renderBooks();
            if (tab === 'courses') renderCourses();
        };

        // Renderizadores de Interface
        function renderHome() {
            const container = document.getElementById('feed-container');
            container.innerHTML = mockFeed.map(post => `
                <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm transition-transform active:scale-[0.98]">
                    <img src="${post.img}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-gray-800">${post.title}</h3>
                        <p class="text-gray-500 text-sm mt-1 line-clamp-2">${post.content}</p>
                        <button class="mt-3 text-blue-600 font-semibold text-sm">Ler mais <i class="fas fa-arrow-right ml-1"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderBooks() {
            const container = document.getElementById('books-container');
            container.innerHTML = mockBooks.map(book => `
                <div class="relative group">
                    <div class="aspect-[3/4] bg-gray-100 rounded-2xl overflow-hidden shadow-md">
                        <img src="${book.cover}" class="w-full h-full object-cover">
                        ${!userEmailAccess ? '<div class="absolute inset-0 bg-black/40 backdrop-blur-[2px] flex items-center justify-center"><i class="fas fa-lock text-white text-2xl"></i></div>' : ''}
                    </div>
                    <div class="mt-2">
                        <p class="font-bold text-sm text-gray-800 line-clamp-1">${book.title}</p>
                        <p class="text-[10px] text-gray-400">${book.author}</p>
                        ${userEmailAccess ? `<a href="${book.link}" class="block mt-1 text-center bg-blue-100 text-blue-700 text-[10px] py-1 rounded-md font-bold">BAIXAR</a>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderCourses() {
            const container = document.getElementById('courses-container');
            container.innerHTML = mockCourses.map(course => `
                <div class="bg-blue-50 p-4 rounded-3xl flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white">
                            <i class="fas fa-play text-lg"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-800">${course.title}</p>
                            <p class="text-blue-600 text-sm font-semibold">${course.price}</p>
                        </div>
                    </div>
                    <a href="${course.link}" target="_blank" class="bg-white p-3 rounded-full shadow-sm">
                        <i class="fas fa-external-link-alt text-blue-600"></i>
                    </a>
                </div>
            `).join('');
        }

        // Lógica de Validação de Acesso
        window.checkAccess = () => {
            document.getElementById('email-modal').classList.remove('hidden');
            document.getElementById('email-modal').classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
        };

        window.validateEmail = async () => {
            const email = document.getElementById('user-email').value;
            if (!email.includes('@')) {
                alert("Por favor, insira um e-mail válido.");
                return;
            }

            // Simulação de verificação no Firebase
            // Aqui você buscaria na coleção: /artifacts/${appId}/public/data/authorized_emails
            try {
                // Simulando salvamento do acesso no Firebase para este usuário específico
                if (currentUser) {
                    const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings');
                    await setDoc(userRef, { email: email, validated: true }, { merge: true });
                }

                localStorage.setItem('educator_email_access', email);
                userEmailAccess = email;
                alert("Acesso Liberado com Sucesso!");
                closeModal();
                renderBooks();
            } catch (err) {
                console.error("Erro ao salvar:", err);
                alert("Houve um erro ao validar seu acesso.");
            }
        };

        initAuth();
    </script>
</body>
</html>
