<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lições de Vida Plena</title>
  
  <!-- Tailwind CSS para Estilização -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome para os Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Bibliotecas do React carregadas diretamente no navegador -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Mammoth.js para ler arquivos .docx diretamente no navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* Previne rolagem no body, delegando para o React */
    }
    /* Evita seleções de texto indesejadas nos botões */
    button {
      user-select: none;
    }
    /* Estilo de scroll para o modo de rolagem vertical */
    .hide-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .hide-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }
    /* Oculta completamente a barra no modo Kindle/Páginas */
    .hide-scrollbar-completely::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar-completely {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    /* Animação de carregamento (Spinner) */
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: currentColor;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // Configuração dos Temas com Degradês
    const themes = {
      claro: { 
        id: 'claro', 
        name: 'Claro', 
        classes: 'bg-gradient-to-br from-gray-50 to-gray-200 text-gray-800',
        panelClasses: 'bg-white/60 border-gray-300'
      },
      polen: { 
        id: 'polen', 
        name: 'Pólen', 
        classes: 'bg-gradient-to-br from-yellow-50 via-amber-50 to-orange-100 text-amber-900',
        panelClasses: 'bg-white/40 border-amber-200'
      },
      escuro: { 
        id: 'escuro', 
        name: 'Escuro', 
        classes: 'bg-gradient-to-br from-gray-700 via-gray-800 to-slate-900 text-gray-100',
        panelClasses: 'bg-black/30 border-gray-600'
      },
      cafe: { 
        id: 'cafe', 
        name: 'Café', 
        classes: 'bg-gradient-to-br from-[#4a3b32] to-[#2e231d] text-[#e8dcc4]',
        panelClasses: 'bg-black/20 border-[#6a5647]'
      },
      azul: { 
        id: 'azul', 
        name: 'Azul', 
        classes: 'bg-gradient-to-br from-slate-700 to-slate-900 text-blue-100',
        panelClasses: 'bg-black/20 border-slate-600'
      },
      vermelho: { 
        id: 'vermelho', 
        name: 'Vermelho', 
        classes: 'bg-gradient-to-br from-[#4a2424] to-[#2d1414] text-[#e8cfcf]',
        panelClasses: 'bg-black/20 border-[#6e3636]'
      }
    };

    // Textos do App
    const initialTexts = [
      { id: 'prologo', title: 'Prólogo', docxUrl: './prologo.docx', content: null },
      { id: 'licao0a', title: 'Lição 0a', docxUrl: './licao-0a.docx', content: null },
      { id: 'licao0b', title: 'Lição 0b', docxUrl: './licao-0b.docx', content: null },
      { id: 'licao0c', title: 'Lição 0c', docxUrl: './licao-0c.docx', content: null },
      { id: 'licao0d', title: 'Lição 0d', docxUrl: './licao-0d.docx', content: null },
      { id: 'licao1', title: 'Lição 1', docxUrl: './licao-1.docx', content: null },
      { id: 'licao2', title: 'Lição 2', docxUrl: './licao-2.docx', content: null },
      { id: 'licao3', title: 'Lição 3', docxUrl: './licao-3.docx', content: null },
      { id: 'licao4', title: 'Lição 4', docxUrl: './licao-4.docx', content: null },
      { id: 'licao5', title: 'Lição 5', docxUrl: './licao-5.docx', content: null },
      { id: 'licao6', title: 'Lição 6', docxUrl: './licao-6.docx', content: null },
      { id: 'licao7', title: 'Lição 7', docxUrl: './licao-7.docx', content: null },
      { id: 'licao8', title: 'Lição 8', docxUrl: './licao-8.docx', content: null },
      { id: 'licao9', title: 'Lição 9', docxUrl: './licao-9.docx', content: null },
      { id: 'licao10', title: 'Lição 10', docxUrl: './licao-10.docx', content: null },
      { id: 'licao11', title: 'Lição 11', docxUrl: './licao-11.docx', content: null },
      { id: 'licao12', title: 'Lição 12', docxUrl: './licao-12.docx', content: null }
    ];

    function App() {
      const loadPrefs = () => {
        try {
          const saved = JSON.parse(localStorage.getItem('leitorWebPrefs'));
          return saved || {};
        } catch(e) { return {}; }
      };
      const prefs = loadPrefs();

      const [texts, setTexts] = useState(initialTexts);
      const [activeTextId, setActiveTextId] = useState(prefs.activeTextId || initialTexts[0].id);
      const [isLoading, setIsLoading] = useState(false); 
      
      const [currentTheme, setCurrentTheme] = useState(themes[prefs.themeId] || themes.polen);
      const [fontSize, setFontSize] = useState(prefs.fontSize || 20); 
      const [lineSpacing, setLineSpacing] = useState(prefs.lineSpacing || 2.0); 
      const [viewMode, setViewMode] = useState(prefs.viewMode || 'page'); 
      const [scrollPositions, setScrollPositions] = useState(prefs.scrollPositions || {});
      const [completedLessons, setCompletedLessons] = useState(prefs.completedLessons || []);
      
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [showThemeSelector, setShowThemeSelector] = useState(false);
      const [windowWidth, setWindowWidth] = useState(window.innerWidth);
      const [pageInfo, setPageInfo] = useState({ current: 1, total: 1 });

      const activeText = texts.find(t => t.id === activeTextId) || texts[0];

      const scrollContainerRef = useRef(null);
      const scrollTimeout = useRef(null);
      const touchTimeout = useRef(null);
      const flipSoundRef = useRef(null);
      
      const synth = window.speechSynthesis;
      const [isPlaying, setIsPlaying] = useState(false);

      // Leitor de DOCX
      useEffect(() => {
        if (activeText && activeText.docxUrl && !activeText.content) {
          setIsLoading(true);
          
          fetch(activeText.docxUrl)
            .then(response => {
              if (!response.ok) throw new Error('Arquivo não encontrado');
              return response.arrayBuffer();
            })
            .then(arrayBuffer => mammoth.convertToHtml({ arrayBuffer: arrayBuffer }))
            .then(result => {
              let rawText = result.value
                .replace(/<\/p><p>/gi, '\n\n')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]+>/g, ''); 
              
              if (!rawText.trim()) rawText = "(O arquivo docx está vazio ou não pôde ser lido)";

              setTexts(prevTexts => prevTexts.map(t => 
                t.id === activeTextId ? { ...t, content: rawText } : t
              ));
              setIsLoading(false);
            })
            .catch(error => {
              console.error(error);
              const errorMsg = `Erro ao carregar o texto.\n\nVerifique se enviou o arquivo "${activeText.docxUrl}" corretamente para o servidor.`;
              setTexts(prevTexts => prevTexts.map(t => 
                t.id === activeTextId ? { ...t, content: errorMsg } : t
              ));
              setIsLoading(false);
            });
        }
      }, [activeTextId, texts]);

      // Atualizar Paginação (Matemática de Colunas)
      const updatePageInfo = useCallback(() => {
        if (viewMode !== 'page' || !scrollContainerRef.current) return;
        const container = scrollContainerRef.current;
        const width = container.clientWidth;
        if (width === 0) return;

        // O scrollWidth total dividido pela largura da janela visível nos dá o total de páginas
        const total = Math.max(1, Math.ceil((container.scrollWidth - 10) / width));
        const current = Math.max(1, Math.round(container.scrollLeft / width) + 1);
        
        setPageInfo({ current: Math.min(current, total), total });
      }, [viewMode]);

      // Responsividade e gatilhos de paginação
      useEffect(() => {
        const handleResize = () => {
          setWindowWidth(window.innerWidth);
          if (window.innerWidth >= 768) setIsSidebarOpen(true);
          else setIsSidebarOpen(false);
          setTimeout(updatePageInfo, 100);
        };
        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [updatePageInfo]);

      // Aciona recalculo de páginas quando texto carrega ou fontes mudam
      useEffect(() => {
        const timeoutId = setTimeout(updatePageInfo, 150);
        return () => clearTimeout(timeoutId);
      }, [activeTextId, fontSize, lineSpacing, viewMode, isLoading, texts, updatePageInfo]);

      // Efeito sonoro de página
      useEffect(() => {
        flipSoundRef.current = new Audio('https://assets.codepen.io/16327/page-flip-01a.mp3');
        flipSoundRef.current.volume = 0.3; // Volume suave para ser agradável
      }, []);

      // Salva Preferências (Agora incluindo Lições Concluídas)
      useEffect(() => {
        const prefsToSave = {
          activeTextId,
          themeId: currentTheme.id,
          fontSize,
          lineSpacing,
          viewMode,
          scrollPositions,
          completedLessons
        };
        localStorage.setItem('leitorWebPrefs', JSON.stringify(prefsToSave));
      }, [activeTextId, currentTheme, fontSize, lineSpacing, viewMode, scrollPositions, completedLessons]);

      // Restaura Posição do Scroll
      useEffect(() => {
        if (scrollContainerRef.current && !isLoading) {
          const savedPos = scrollPositions[`${activeTextId}_${viewMode}`] || 0;
          if (viewMode === 'scroll') {
            scrollContainerRef.current.scrollTop = savedPos;
          } else {
            scrollContainerRef.current.scrollLeft = savedPos;
          }
        }
      }, [activeTextId, viewMode, isLoading]);

      useEffect(() => {
        return () => synth.cancel();
      }, [synth]);

      // Alternar Conclusão da Lição
      const toggleLessonCompletion = (id) => {
        setCompletedLessons(prev => 
          prev.includes(id) ? prev.filter(lessonId => lessonId !== id) : [...prev, id]
        );
      };

      // Rastreamento de leitura
      const handleScroll = (e) => {
        const pos = viewMode === 'scroll' ? e.target.scrollTop : e.target.scrollLeft;
        
        if (viewMode === 'page') updatePageInfo(); // Atualiza numeração de página ao vivo

        if (scrollTimeout.current) clearTimeout(scrollTimeout.current);
        scrollTimeout.current = setTimeout(() => {
          setScrollPositions(prev => ({
            ...prev,
            [`${activeTextId}_${viewMode}`]: pos
          }));
        }, 300);
      };

      // Toca o som de passar página
      const playFlipSound = () => {
        if (flipSoundRef.current && viewMode === 'page') {
          flipSoundRef.current.currentTime = 0;
          flipSoundRef.current.play().catch(() => {}); // Silencia erro se não houver interação prévia do utilizador
        }
      };

      // Trava de página ("Snap") após arrastar com o dedo
      const handleTouchEnd = () => {
        if (viewMode !== 'page' || !scrollContainerRef.current) return;
        
        if (touchTimeout.current) clearTimeout(touchTimeout.current);
        touchTimeout.current = setTimeout(() => {
          if (!scrollContainerRef.current) return;
          const container = scrollContainerRef.current;
          const width = container.clientWidth;
          const currentScroll = container.scrollLeft;
          const targetPage = Math.round(currentScroll / width);
          
          // Se a rolagem atual estiver "quebrada" no meio, centraliza a página mais próxima
          if (Math.abs(currentScroll - (targetPage * width)) > 5) {
             container.scrollTo({ left: targetPage * width, behavior: 'smooth' });
             playFlipSound(); // Toca o som ao ajustar a página no celular
          }
        }, 300); 
      };

      // Virar página (Estilo Kindle)
      const turnPage = (direction) => {
        if (scrollContainerRef.current) {
          const container = scrollContainerRef.current;
          const scrollAmount = container.clientWidth; // Pula exatamente uma tela cheia
          container.scrollBy({
            left: direction === 'next' ? scrollAmount : -scrollAmount,
            behavior: 'smooth'
          });
          playFlipSound(); // Toca o som ao clicar na seta
        }
      };

      const handleZoomIn = () => setFontSize(prev => Math.min(prev + 2, 48));
      const handleZoomOut = () => setFontSize(prev => Math.max(prev - 2, 14));

      const handleLineSpacing = () => {
        setLineSpacing(prev => {
          if (prev === 1.2) return 1.6;
          if (prev === 1.6) return 2.0;
          return 1.2;
        });
      };

      const toggleViewMode = () => {
        setViewMode(prev => prev === 'scroll' ? 'page' : 'scroll');
      };

      const toggleSpeech = () => {
        if (isPlaying) {
          synth.cancel();
          setIsPlaying(false);
        } else {
          if (!activeText || !activeText.content) return;
          const utterance = new SpeechSynthesisUtterance(activeText.content);
          utterance.lang = 'pt-BR'; 
          utterance.onend = () => setIsPlaying(false);
          utterance.onerror = () => setIsPlaying(false);
          synth.speak(utterance);
          setIsPlaying(true);
        }
      };

      // Cálculos Matemáticos precisos para colunas
      const isSm = windowWidth >= 640;
      const pad = isSm ? 32 : 16;

      return (
        <div className={`min-h-[100dvh] flex transition-colors duration-500 ease-in-out ${currentTheme.classes}`}>
          
          {/* Overlay Escuro para Mobile */}
          <div 
            className={`fixed inset-0 bg-black/40 z-30 transition-opacity duration-300 md:hidden backdrop-blur-sm
              ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
            onClick={() => setIsSidebarOpen(false)}
          ></div>

          {/* Menu Lateral (Sidebar) */}
          <aside 
            className={`fixed inset-y-0 left-0 z-40 w-4/5 max-w-[280px] md:relative md:max-w-none md:w-72 h-[100dvh] flex flex-col border-r backdrop-blur-xl transition-transform duration-300 ease-in-out ${currentTheme.panelClasses}
              ${isSidebarOpen ? 'translate-x-0 shadow-2xl md:shadow-none' : '-translate-x-full md:translate-x-0'}`}
          >
            <div className="p-4 md:p-5 flex items-center justify-between border-b border-inherit shrink-0">
              <div className="flex items-center gap-3 font-bold text-xl opacity-90">
                <i className="fas fa-bookmark text-xl"></i>
                <span>Menu de Lições</span>
              </div>
              <button 
                onClick={() => setIsSidebarOpen(false)} 
                className="md:hidden p-3 -mr-3 rounded-full hover:bg-black/10 active:scale-95 transition-all"
                aria-label="Fechar menu"
              >
                <i className="fas fa-times text-xl"></i>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 pt-4 space-y-2">
              {texts.map(text => (
                <div 
                  key={text.id}
                  onClick={() => {
                    setActiveTextId(text.id);
                    if (isPlaying) { synth.cancel(); setIsPlaying(false); }
                    if (window.innerWidth < 768) setIsSidebarOpen(false);
                  }}
                  className={`p-3.5 rounded-xl cursor-pointer transition-all flex justify-between items-center group
                    ${activeTextId === text.id ? 'bg-black/10 shadow-sm ring-1 ring-inherit font-bold' : 'hover:bg-black/5 active:bg-black/10'}`}
                >
                  <span className="truncate pr-2 text-[15px]">{text.title}</span>
                  
                  {/* Ícone de Check Verde para Lições Concluídas */}
                  {completedLessons.includes(text.id) && (
                    <i className="fas fa-check-circle text-green-500 text-lg shadow-sm rounded-full bg-white/30 backdrop-blur-sm"></i>
                  )}
                </div>
              ))}
            </div>
          </aside>

          {/* Conteúdo Principal */}
          <main className="flex-1 flex flex-col h-[100dvh] w-full min-w-0 overflow-hidden relative">
            
            {/* Barra de Ferramentas */}
            <header className={`p-2 sm:p-4 flex items-center justify-between border-b backdrop-blur-md z-20 shrink-0 ${currentTheme.panelClasses}`}>
              <div className="flex items-center gap-1 sm:gap-2 shrink-0 max-w-[40%] sm:max-w-[50%]">
                <button 
                  onClick={() => setIsSidebarOpen(true)} 
                  className="p-3 rounded-xl hover:bg-black/10 active:scale-95 transition-all md:hidden shrink-0"
                  aria-label="Abrir menu"
                >
                  <i className="fas fa-bars text-xl"></i>
                </button>
                {/* Título do App (Visível e Truncado caso falte espaço) */}
                <h1 className="font-bold text-[10px] sm:text-xs md:text-sm pl-1 sm:pl-2 opacity-80 uppercase tracking-widest truncate">
                  Lições de Vida Plena
                </h1>
              </div>

              {/* Botões de Controle */}
              <div className="flex items-center gap-1 sm:gap-2 pr-1 sm:pr-0 overflow-x-auto hide-scrollbar shrink-0">
                
                <button 
                  onClick={toggleSpeech}
                  disabled={isLoading}
                  className={`flex items-center justify-center gap-2 px-4 py-2.5 rounded-full font-bold transition-all active:scale-95 shadow-sm shrink-0
                    ${isPlaying ? 'bg-red-500/20 text-red-600 ring-2 ring-red-500/50' : 'bg-black/10 hover:bg-black/20'}
                    ${isLoading ? 'opacity-50 cursor-not-allowed' : ''}`}
                >
                  {isPlaying ? <i className="fas fa-square text-lg"></i> : <i className="fas fa-play text-lg"></i>}
                  <span className="hidden sm:inline">{isPlaying ? 'Parar' : 'Ouvir'}</span>
                </button>

                <div className="h-8 w-px bg-current opacity-20 mx-1 sm:mx-2 shrink-0"></div>

                <button onClick={toggleViewMode} className="p-3 rounded-full hover:bg-black/10 active:scale-90 transition-all shrink-0" title="Modo de Leitura (Rolagem ou Páginas)">
                  <i className={`fas ${viewMode === 'scroll' ? 'fa-book-open' : 'fa-scroll'} text-xl`}></i>
                </button>

                <button onClick={handleLineSpacing} className="p-3 rounded-full hover:bg-black/10 active:scale-90 transition-all shrink-0" title="Espaçamento das Linhas">
                  <i className="fas fa-text-height text-xl"></i>
                </button>

                <div className="h-8 w-px bg-current opacity-20 mx-1 sm:mx-2 shrink-0"></div>

                <button onClick={handleZoomOut} className="p-3 rounded-full hover:bg-black/10 active:scale-90 transition-all shrink-0" title="Diminuir texto">
                  <i className="fas fa-search-minus text-xl"></i>
                </button>
                <button onClick={handleZoomIn} className="p-3 rounded-full hover:bg-black/10 active:scale-90 transition-all shrink-0" title="Aumentar texto">
                  <i className="fas fa-search-plus text-xl"></i>
                </button>

                <div className="h-8 w-px bg-current opacity-20 mx-1 sm:mx-2 shrink-0"></div>

                {/* Seletor de Tema */}
                <div className="relative shrink-0">
                  <button 
                    onClick={() => setShowThemeSelector(!showThemeSelector)}
                    className="p-3 rounded-full hover:bg-black/10 active:scale-90 transition-all flex items-center gap-2"
                    title="Mudar Tema"
                  >
                    <i className="fas fa-palette text-xl"></i>
                  </button>
                  
                  {showThemeSelector && (
                    <React.Fragment>
                      <div className="fixed inset-0 z-40" onClick={() => setShowThemeSelector(false)}></div>
                      <div className={`absolute right-0 top-full mt-2 p-2 rounded-2xl shadow-2xl border backdrop-blur-2xl w-48 z-50 origin-top-right animate-in fade-in zoom-in-95 duration-200 ${currentTheme.panelClasses}`}>
                        {Object.values(themes).map(theme => (
                          <button
                            key={theme.id}
                            onClick={() => {
                              setCurrentTheme(theme);
                              setShowThemeSelector(false);
                            }}
                            className={`w-full text-left px-4 py-3 rounded-xl mb-1 flex items-center gap-3 transition-colors active:scale-95
                              ${currentTheme.id === theme.id ? 'bg-black/20 font-bold' : 'hover:bg-black/10'}`}
                          >
                            <div className={`w-4 h-4 rounded-full shadow-sm ${theme.classes.split(' ')[1]}`}></div>
                            {theme.name}
                          </button>
                        ))}
                      </div>
                    </React.Fragment>
                  )}
                </div>
              </div>
            </header>

            {/* Container Dinâmico com as Setas Virtuais do Kindle */}
            <div className="flex-1 w-full relative flex overflow-hidden">
              
              {/* Botões de Navegação Laterais (Translúcidos) */}
              {viewMode === 'page' && !isLoading && activeText && (
                <div className="absolute inset-0 pointer-events-none flex justify-between z-10 pb-8">
                  {/* Seta Esquerda */}
                  <button 
                    onClick={() => turnPage('prev')}
                    className="pointer-events-auto h-full w-16 sm:w-28 flex items-center justify-start pl-2 sm:pl-6 text-current opacity-10 hover:opacity-40 transition-opacity active:opacity-60"
                    title="Página Anterior"
                  >
                    <i className="fas fa-chevron-left text-5xl sm:text-7xl"></i>
                  </button>
                  {/* Seta Direita */}
                  <button 
                    onClick={() => turnPage('next')}
                    className="pointer-events-auto h-full w-16 sm:w-28 flex items-center justify-end pr-2 sm:pr-6 text-current opacity-10 hover:opacity-40 transition-opacity active:opacity-60"
                    title="Próxima Página"
                  >
                    <i className="fas fa-chevron-right text-5xl sm:text-7xl"></i>
                  </button>
                </div>
              )}

              {/* Área de Leitura com Scroll nativo */}
              <div 
                ref={scrollContainerRef}
                onScroll={handleScroll}
                onTouchEnd={handleTouchEnd}
                className={`flex-1 w-full h-full relative scroll-smooth
                  ${viewMode === 'scroll' ? 'overflow-y-auto overflow-x-hidden hide-scrollbar' : 'overflow-x-auto overflow-y-hidden hide-scrollbar-completely'}`}
              >
                <div className={`mx-auto w-full ${viewMode === 'scroll' ? 'max-w-3xl p-4 sm:p-6 md:p-12 pb-32' : 'h-full'}`}>
                  
                  {isLoading ? (
                    <div className="flex flex-col items-center justify-center h-full opacity-60 pt-20">
                      <div className="loader mb-4"></div>
                      <p className="font-bold tracking-widest uppercase text-sm">Extraindo do Word...</p>
                    </div>
                  ) : activeText && (
                    <article 
                      className="w-full break-words transition-all duration-300 relative"
                      style={viewMode === 'page' ? {
                        /* A mágica do layout de colunas perfeito que não "quebra" as palavras horizontalmente */
                        columnWidth: `calc(100vw - ${pad * 2}px)`,
                        columnGap: `${pad * 2}px`,
                        height: '100%', 
                        padding: `24px ${pad}px 40px ${pad}px`, 
                        boxSizing: 'border-box'
                      } : { paddingBottom: '80px' }}
                    >
                      <h2 
                        className="font-bold mb-6 sm:mb-8 leading-tight opacity-90"
                        style={{ fontSize: `${fontSize * 1.4}px`, breakAfter: 'avoid' }}
                      >
                        {activeText.title}
                      </h2>
                      
                      <div 
                        className="opacity-85 whitespace-pre-wrap font-serif text-justify"
                        style={{ 
                          fontSize: `${fontSize}px`, 
                          lineHeight: lineSpacing 
                        }}
                      >
                        {activeText.content}
                      </div>

                      {/* Botão de Marcar como Concluído no Final do Texto */}
                      <div 
                        className="mt-16 mb-8 flex justify-center w-full"
                        style={{ breakInside: 'avoid', pageBreakInside: 'avoid' }}
                      >
                        <button
                          onClick={() => toggleLessonCompletion(activeText.id)}
                          className={`flex items-center gap-3 px-6 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95 border-2 z-20 relative
                            ${completedLessons.includes(activeText.id) 
                              ? 'bg-green-600/90 text-white border-green-500 hover:bg-green-700' 
                              : 'bg-black/10 border-current hover:bg-black/20'}`}
                        >
                          <i className={`fas ${completedLessons.includes(activeText.id) ? 'fa-check-double' : 'fa-check'}`}></i>
                          {completedLessons.includes(activeText.id) ? 'Lição Concluída!' : 'Marcar como Concluído'}
                        </button>
                      </div>
                    </article>
                  )}
                </div>
              </div>

              {/* Marcador Fixo de Numeração de Página (Rodapé) */}
              {viewMode === 'page' && !isLoading && activeText && (
                <div className="absolute bottom-2 left-0 right-0 w-full text-center pointer-events-none z-20">
                  <span className="bg-black/10 backdrop-blur-sm px-4 py-1.5 rounded-full text-[10px] sm:text-xs font-bold opacity-60 tracking-wider">
                    {activeText.title} • Pág {pageInfo.current} de {pageInfo.total}
                  </span>
                </div>
              )}

            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
