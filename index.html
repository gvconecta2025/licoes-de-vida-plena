<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço de Fé - Educador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --theme-start: #1e40af;
            --theme-end: #3b82f6;
            --theme-text-accent: #2563eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .active-tab {
            color: var(--theme-text-accent);
            border-bottom: 3px solid var(--theme-text-accent);
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--theme-start) 0%, var(--theme-end) 100%);
            transition: background 0.4s ease;
        }

        .theme-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .theme-dot:active {
            transform: scale(0.9);
        }

        /* Esconder scrollbar mas manter funcionalidade */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen shadow-2xl bg-white relative pb-20">

    <!-- Header / Perfil -->
    <header class="gradient-bg text-white p-6 rounded-b-[2.5rem] shadow-lg">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold">Caminho da Fé</h1>
                <p class="text-white/80 text-sm">Seu espaço de estudo e reflexão.</p>
            </div>
            <div class="w-12 h-12 rounded-full border-2 border-white overflow-hidden bg-white/20 flex items-center justify-center">
                <i class="fas fa-dove text-xl"></i>
            </div>
        </div>
        
        <!-- Seletor de Temas (Substituindo Pesquisa) -->
        <div class="flex items-center gap-3 overflow-x-auto no-scrollbar py-2">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-70 whitespace-nowrap">Temas:</span>
            <div onclick="setTheme('blue')" class="theme-dot bg-blue-600" title="Azul"></div>
            <div onclick="setTheme('green')" class="theme-dot bg-green-600" title="Verde"></div>
            <div onclick="setTheme('red')" class="theme-dot bg-red-600" title="Vermelho"></div>
            <div onclick="setTheme('coffee')" class="theme-dot bg-[795548]" style="background-color: #5d4037;" title="Café"></div>
            <div onclick="setTheme('petrol')" class="theme-dot bg-cyan-800" title="Azul Petróleo"></div>
            <div onclick="setTheme('light')" class="theme-dot bg-slate-400" title="Claro"></div>
            <div onclick="setTheme('pollen')" class="theme-dot bg-amber-500" title="Polen"></div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="p-5">
        <!-- Loader inicial -->
        <div id="loader" class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        </div>

        <!-- View: Feed (Home) -->
        <section id="view-home" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-800">Reflexões Diárias</h2>
            <div id="feed-container" class="space-y-4">
                <!-- Posts injetados via JS -->
            </div>
        </section>

        <!-- View: Livros (Estante) -->
        <section id="view-books" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">E-books de Fé</h2>
                <button onclick="checkAccess()" class="text-xs font-semibold text-blue-600 bg-blue-50 px-3 py-1 rounded-full btn-accent-text">Validar Acesso</button>
            </div>
            <div id="books-container" class="grid grid-cols-2 gap-4">
                <!-- Livros injetados via JS -->
            </div>
        </section>

        <!-- View: Cursos -->
        <section id="view-courses" class="hidden space-y-6">
            <h2 class="text-xl font-bold text-gray-800">Formação Teológica</h2>
            <div id="courses-container" class="space-y-4">
                <!-- Cursos injetados via JS -->
            </div>
        </section>
    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t border-gray-100 px-6 py-3 flex justify-between items-center z-50">
        <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center gap-1 transition-all active-tab nav-btn">
            <i class="fas fa-hands-praying text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Início</span>
        </button>
        <button onclick="switchTab('books')" id="nav-books" class="flex flex-col items-center gap-1 transition-all text-gray-400 nav-btn">
            <i class="fas fa-book-bible text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Estante</span>
        </button>
        <button onclick="switchTab('courses')" id="nav-courses" class="flex flex-col items-center gap-1 transition-all text-gray-400 nav-btn">
            <i class="fas fa-chalkboard-user text-xl"></i>
            <span class="text-[10px] font-bold uppercase tracking-wider">Cursos</span>
        </button>
    </nav>

    <!-- Modal de Validação de Email -->
    <div id="email-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-6 z-[60]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <i class="fas fa-envelope-open-text text-blue-600 text-4xl mb-4 icon-accent"></i>
            <h3 class="text-xl font-bold mb-2">Acesso aos Livros</h3>
            <p class="text-gray-500 text-sm mb-6">Insira o e-mail cadastrado para baixar suas obras de estudo.</p>
            <input type="email" id="user-email" placeholder="seu@email.com" class="w-full border p-3 rounded-xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 text-center">
            <button onclick="validateEmail()" class="w-full gradient-bg text-white font-bold py-3 rounded-xl shadow-lg">Liberar Acesso</button>
            <button onclick="closeModal()" class="mt-4 text-gray-400 text-sm">Voltar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, query, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Configuração Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let userEmailAccess = localStorage.getItem('educator_email_access') || null;

        // Paleta de Cores dos Temas
        const themes = {
            blue: { start: '#1e40af', end: '#3b82f6', accent: '#2563eb' },
            green: { start: '#14532d', end: '#22c55e', accent: '#16a34a' },
            red: { start: '#7f1d1d', end: '#ef4444', accent: '#dc2626' },
            coffee: { start: '#3e2723', end: '#8d6e63', accent: '#6d4c41' },
            petrol: { start: '#083344', end: '#0891b2', accent: '#0e7490' },
            light: { start: '#475569', end: '#94a3b8', accent: '#64748b' },
            pollen: { start: '#78350f', end: '#f59e0b', accent: '#d97706' }
        };

        window.setTheme = (themeName) => {
            const theme = themes[themeName];
            document.documentElement.style.setProperty('--theme-start', theme.start);
            document.documentElement.style.setProperty('--theme-end', theme.end);
            document.documentElement.style.setProperty('--theme-text-accent', theme.accent);
            
            // Atualizar cor de botões de acento via JS
            document.querySelectorAll('.btn-accent-text').forEach(el => el.style.color = theme.accent);
            document.querySelectorAll('.icon-accent').forEach(el => el.style.color = theme.accent);
            
            localStorage.setItem('user_theme_pref', themeName);
        };

        // Dados Temáticos: Fé
        const mockFeed = [
            { id: 1, title: "A Força da Oração", content: "Estudo sobre como a oração constante transforma o ambiente ao nosso redor...", img: "https://images.unsplash.com/photo-1507692049790-de58290a4334?auto=format&fit=crop&w=400&q=80" },
            { id: 2, title: "Parábolas Comentadas", content: "Uma análise profunda sobre a parábola do semeador e seus frutos hoje.", img: "https://images.unsplash.com/photo-1490730141103-6ca3d7d6cf70?auto=format&fit=crop&w=400&q=80" }
        ];

        const mockBooks = [
            { id: 1, title: "Fundamentos da Fé", author: "Educador de Fé", cover: "https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&w=400&q=80", link: "#" },
            { id: 2, title: "História do Cristianismo", author: "M. Oliveira", cover: "https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&w=400&q=80", link: "#" }
        ];

        const mockCourses = [
            { id: 1, title: "Teologia para Todos", price: "R$ 147,00", link: "https://hotmart.com" },
            { id: 2, title: "Hermenêutica Avançada", price: "R$ 297,00", link: "https://hotmart.com" }
        ];

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                const savedTheme = localStorage.getItem('user_theme_pref') || 'blue';
                setTheme(savedTheme);
                renderHome();
                document.getElementById('loader').classList.add('hidden');
                switchTab('home');
            }
        });

        window.switchTab = (tab) => {
            ['home', 'books', 'courses'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`nav-${t}`).classList.remove('active-tab');
                document.getElementById(`nav-${t}`).classList.add('text-gray-400');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`nav-${tab}`).classList.add('active-tab');
            document.getElementById(`nav-${tab}`).classList.remove('text-gray-400');

            if (tab === 'home') renderHome();
            if (tab === 'books') renderBooks();
            if (tab === 'courses') renderCourses();
        };

        function renderHome() {
            const container = document.getElementById('feed-container');
            container.innerHTML = mockFeed.map(post => `
                <div class="bg-white rounded-3xl overflow-hidden border border-gray-100 shadow-sm transition-transform active:scale-[0.98]">
                    <img src="${post.img}" class="w-full h-40 object-cover">
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-gray-800">${post.title}</h3>
                        <p class="text-gray-500 text-sm mt-1 line-clamp-2">${post.content}</p>
                        <button class="mt-3 text-[var(--theme-text-accent)] font-semibold text-sm">Continuar estudo <i class="fas fa-arrow-right ml-1"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderBooks() {
            const container = document.getElementById('books-container');
            container.innerHTML = mockBooks.map(book => `
                <div class="relative group">
                    <div class="aspect-[3/4] bg-gray-100 rounded-2xl overflow-hidden shadow-md">
                        <img src="${book.cover}" class="w-full h-full object-cover">
                        ${!userEmailAccess ? '<div class="absolute inset-0 bg-black/40 backdrop-blur-[2px] flex items-center justify-center"><i class="fas fa-lock text-white text-2xl"></i></div>' : ''}
                    </div>
                    <div class="mt-2">
                        <p class="font-bold text-sm text-gray-800 line-clamp-1">${book.title}</p>
                        <p class="text-[10px] text-gray-400">${book.author}</p>
                        ${userEmailAccess ? `<a href="${book.link}" class="block mt-1 text-center bg-blue-50 text-[var(--theme-text-accent)] text-[10px] py-1 rounded-md font-bold">BAIXAR PDF</a>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderCourses() {
            const container = document.getElementById('courses-container');
            container.innerHTML = mockCourses.map(course => `
                <div class="bg-slate-50 p-4 rounded-3xl flex items-center justify-between border border-slate-100">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 gradient-bg rounded-2xl flex items-center justify-center text-white">
                            <i class="fas fa-play text-sm"></i>
                        </div>
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${course.title}</p>
                            <p class="text-[var(--theme-text-accent)] text-xs font-semibold">${course.price}</p>
                        </div>
                    </div>
                    <a href="${course.link}" target="_blank" class="bg-white p-3 rounded-full shadow-sm text-[var(--theme-text-accent)]">
                        <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            `).join('');
        }

        window.checkAccess = () => {
            document.getElementById('email-modal').classList.remove('hidden');
            document.getElementById('email-modal').classList.add('flex');
        };

        window.closeModal = () => {
            document.getElementById('email-modal').classList.add('hidden');
            document.getElementById('email-modal').classList.remove('flex');
        };

        window.validateEmail = async () => {
            const email = document.getElementById('user-email').value;
            if (!email.includes('@')) return;

            try {
                if (currentUser) {
                    const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'settings');
                    await setDoc(userRef, { email: email, validated: true }, { merge: true });
                }
                localStorage.setItem('educator_email_access', email);
                userEmailAccess = email;
                closeModal();
                renderBooks();
            } catch (err) {
                console.error("Erro:", err);
            }
        };

        initAuth();
    </script>
</body>
</html>
