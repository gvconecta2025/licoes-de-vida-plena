<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lições de Vida Plena</title>
  
  <!-- Tailwind CSS para Estilização -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome para os Ícones -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Bibliotecas do React carregadas diretamente no navegador -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Mammoth.js para ler arquivos .docx diretamente no navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; 
    }
    button {
      user-select: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .hide-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
    }
    .hide-scrollbar-completely::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar-completely {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .loader {
      border: 4px solid rgba(255,255,255,0.1);
      border-left-color: currentColor;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const themes = {
      claro: { id: 'claro', name: 'Claro', classes: 'bg-gradient-to-br from-gray-50 to-gray-200 text-gray-800', panelClasses: 'bg-white/60 border-gray-300', solidMenuClasses: 'bg-gray-50 border-gray-300', preview: 'bg-gray-200' },
      polen: { id: 'polen', name: 'Pólen', classes: 'bg-gradient-to-br from-yellow-50 via-amber-50 to-orange-100 text-amber-900', panelClasses: 'bg-white/40 border-amber-200', solidMenuClasses: 'bg-amber-50 border-amber-300', preview: 'bg-amber-200' },
      escuro: { id: 'escuro', name: 'Escuro', classes: 'bg-gradient-to-br from-zinc-800 to-black text-zinc-100', panelClasses: 'bg-zinc-900/50 border-zinc-700', solidMenuClasses: 'bg-zinc-900 border-zinc-700', preview: 'bg-zinc-800' },
      cafe: { id: 'cafe', name: 'Café', classes: 'bg-gradient-to-br from-[#4a3b32] to-[#2e231d] text-[#e8dcc4]', panelClasses: 'bg-black/20 border-[#6a5647]', solidMenuClasses: 'bg-[#3b2d26] border-[#6a5647]', preview: 'bg-[#4a3b32]' },
      azul: { id: 'azul', name: 'Azul', classes: 'bg-gradient-to-br from-slate-700 to-slate-900 text-blue-100', panelClasses: 'bg-black/20 border-slate-600', solidMenuClasses: 'bg-slate-800 border-slate-600', preview: 'bg-slate-700' },
      vermelho: { id: 'vermelho', name: 'Vermelho', classes: 'bg-gradient-to-br from-[#4a2424] to-[#2d1414] text-[#e8cfcf]', panelClasses: 'bg-black/20 border-[#6e3636]', solidMenuClasses: 'bg-[#3d1e1e] border-[#6e3636]', preview: 'bg-[#4a2424]' }
    };

    // Textos e Páginas Especiais (Capa e Autor)
    const initialTexts = [
      { id: 'capa', title: 'Capa do Livro', type: 'special' }, 
      { id: 'prologo', title: 'Prólogo', docxUrl: './prologo.docx', content: null },
      { id: 'licao0a', title: 'Lição 0a', docxUrl: './licao-0a.docx', content: null },
      { id: 'licao0b', title: 'Lição 0b', docxUrl: './licao-0b.docx', content: null },
      { id: 'licao0c', title: 'Lição 0c', docxUrl: './licao-0c.docx', content: null },
      { id: 'licao0d', title: 'Lição 0d', docxUrl: './licao-0d.docx', content: null },
      { id: 'licao1', title: 'Lição 1', docxUrl: './licao-1.docx', content: null },
      { id: 'licao2', title: 'Lição 2', docxUrl: './licao-2.docx', content: null },
      { id: 'licao3', title: 'Lição 3', docxUrl: './licao-3.docx', content: null },
      { id: 'licao4', title: 'Lição 4', docxUrl: './licao-4.docx', content: null },
      { id: 'licao5', title: 'Lição 5', docxUrl: './licao-5.docx', content: null },
      { id: 'licao6', title: 'Lição 6', docxUrl: './licao-6.docx', content: null },
      { id: 'licao7', title: 'Lição 7', docxUrl: './licao-7.docx', content: null },
      { id: 'licao8', title: 'Lição 8', docxUrl: './licao-8.docx', content: null },
      { id: 'licao9', title: 'Lição 9', docxUrl: './licao-9.docx', content: null },
      { id: 'licao10', title: 'Lição 10', docxUrl: './licao-10.docx', content: null },
      { id: 'licao11', title: 'Lição 11', docxUrl: './licao-11.docx', content: null },
      { id: 'licao12', title: 'Lição 12', docxUrl: './licao-12.docx', content: null },
      { id: 'autor', title: 'Sobre o Autor', type: 'special' } 
    ];

    function App() {
      const loadPrefs = () => {
        try { return JSON.parse(localStorage.getItem('leitorWebPrefs')) || {}; } 
        catch(e) { return {}; }
      };
      
      const loadOfflineContent = () => {
        try { return JSON.parse(localStorage.getItem('leitorWebOfflineDocs')) || {}; } 
        catch(e) { return {}; }
      };

      const prefs = loadPrefs();
      const offlineDocs = loadOfflineContent();

      const [texts, setTexts] = useState(initialTexts);
      const [activeTextId, setActiveTextId] = useState(prefs.activeTextId || 'capa');
      const [isLoading, setIsLoading] = useState(false); 
      
      const [currentTheme, setCurrentTheme] = useState(themes[prefs.themeId] || themes.polen);
      const [fontSize, setFontSize] = useState(prefs.fontSize || 20); 
      const [lineSpacing, setLineSpacing] = useState(prefs.lineSpacing || 2.0); 
      const [viewMode, setViewMode] = useState(prefs.viewMode || 'page'); 
      const [scrollPositions, setScrollPositions] = useState(prefs.scrollPositions || {});
      const [completedLessons, setCompletedLessons] = useState(prefs.completedLessons || []);
      const [extractedTitles, setExtractedTitles] = useState(prefs.extractedTitles || {});
      
      // Novo estado para guardar os destaques (marca-textos)
      const [highlights, setHighlights] = useState(prefs.highlights || {});
      const [selectionMenu, setSelectionMenu] = useState(null);
      
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [windowWidth, setWindowWidth] = useState(window.innerWidth);
      const [pageInfo, setPageInfo] = useState({ current: 1, total: 1 });

      const activeText = texts.find(t => t.id === activeTextId) || texts[0];

      const scrollContainerRef = useRef(null);
      const scrollTimeout = useRef(null);
      const touchTimeout = useRef(null);
      const flipSoundRef = useRef(null);
      const utteranceRef = useRef(null); 
      
      const [isPlaying, setIsPlaying] = useState(false);

      useEffect(() => {
        if (activeText && activeText.docxUrl && !activeText.content && activeText.type !== 'special') {
          
          if (offlineDocs[activeText.id]) {
             setTexts(prevTexts => prevTexts.map(t => 
                t.id === activeTextId ? { ...t, content: offlineDocs[activeText.id] } : t
             ));
             return; 
          }

          setIsLoading(true);
          fetch(activeText.docxUrl)
            .then(response => {
              if (!response.ok) throw new Error('Arquivo não encontrado');
              return response.arrayBuffer();
            })
            .then(arrayBuffer => mammoth.convertToHtml({ arrayBuffer: arrayBuffer }))
            .then(result => {
              const tempDiv = document.createElement('div');
              tempDiv.innerHTML = result.value;
              
              const firstChild = tempDiv.firstElementChild;
              
              if (firstChild && firstChild.textContent.trim().length > 0) {
                const titleText = firstChild.textContent.trim();
                setExtractedTitles(prev => ({ ...prev, [activeTextId]: titleText }));
                firstChild.remove(); 
              }

              let rawText = tempDiv.innerHTML
                .replace(/<\/p><p>/gi, '\n\n')
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<[^>]+>/g, ''); 
              
              if (!rawText.trim()) rawText = "(O arquivo docx está vazio ou não pôde ser lido)";

              const updatedOfflineDocs = { ...loadOfflineContent(), [activeTextId]: rawText };
              localStorage.setItem('leitorWebOfflineDocs', JSON.stringify(updatedOfflineDocs));

              setTexts(prevTexts => prevTexts.map(t => 
                t.id === activeTextId ? { ...t, content: rawText } : t
              ));
              setIsLoading(false);
            })
            .catch(error => {
              console.error(error);
              const errorMsg = `O arquivo desta lição ainda não foi disponibilizado ou ocorreu um erro de conexão.\n\nVerifique se tem internet ou se o autor já publicou esta lição.`;
              setTexts(prevTexts => prevTexts.map(t => 
                t.id === activeTextId ? { ...t, content: errorMsg } : t
              ));
              setIsLoading(false);
            });
        }
      }, [activeTextId, texts]);

      const updatePageInfo = useCallback(() => {
        if (viewMode !== 'page' || !scrollContainerRef.current || activeText.type === 'special') return;
        const container = scrollContainerRef.current;
        const width = container.clientWidth;
        if (width === 0) return;

        const total = Math.max(1, Math.ceil((container.scrollWidth - 10) / width));
        const current = Math.max(1, Math.round(container.scrollLeft / width) + 1);
        
        setPageInfo({ current: Math.min(current, total), total });
      }, [viewMode, activeText.type]);

      useEffect(() => {
        const handleResize = () => {
          setWindowWidth(window.innerWidth);
          if (window.innerWidth >= 768) setIsSidebarOpen(true);
          else setIsSidebarOpen(false);
          setTimeout(updatePageInfo, 100);
        };
        handleResize();
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, [updatePageInfo]);

      useEffect(() => {
        const timeoutId = setTimeout(updatePageInfo, 150);
        return () => clearTimeout(timeoutId);
      }, [activeTextId, fontSize, lineSpacing, viewMode, isLoading, texts, updatePageInfo]);

      useEffect(() => {
        flipSoundRef.current = new Audio('https://assets.codepen.io/16327/page-flip-01a.mp3');
        flipSoundRef.current.volume = 0.3; 
      }, []);

      useEffect(() => {
        const prefsToSave = {
          activeTextId,
          themeId: currentTheme.id,
          fontSize,
          lineSpacing,
          viewMode,
          scrollPositions,
          completedLessons,
          extractedTitles,
          highlights // Salvando destaques no cache
        };
        localStorage.setItem('leitorWebPrefs', JSON.stringify(prefsToSave));
      }, [activeTextId, currentTheme, fontSize, lineSpacing, viewMode, scrollPositions, completedLessons, extractedTitles, highlights]);

      // Restaura Posição do Scroll
      useEffect(() => {
        if (scrollContainerRef.current && !isLoading && activeText.type !== 'special') {
          const savedPos = scrollPositions[`${activeTextId}_${viewMode}`] || 0;
          if (viewMode === 'scroll') scrollContainerRef.current.scrollTop = savedPos;
          else scrollContainerRef.current.scrollLeft = savedPos;
        } else if (scrollContainerRef.current && activeText.type === 'special') {
          scrollContainerRef.current.scrollTop = 0;
          scrollContainerRef.current.scrollLeft = 0;
        }
      }, [activeTextId, viewMode, isLoading, activeText.type]);

      useEffect(() => {
        return () => window.speechSynthesis.cancel();
      }, []);

      const toggleLessonCompletion = (id) => {
        setCompletedLessons(prev => 
          prev.includes(id) ? prev.filter(lessonId => lessonId !== id) : [...prev, id]
        );
      };

      const handleScroll = (e) => {
        if (selectionMenu) setSelectionMenu(null); // Esconde o menu de marca-texto ao rolar
        
        if (activeText.type === 'special') return;
        const pos = viewMode === 'scroll' ? e.target.scrollTop : e.target.scrollLeft;
        
        if (viewMode === 'page') updatePageInfo(); 

        if (scrollTimeout.current) clearTimeout(scrollTimeout.current);
        scrollTimeout.current = setTimeout(() => {
          setScrollPositions(prev => ({
            ...prev,
            [`${activeTextId}_${viewMode}`]: pos
          }));
        }, 300);
      };

      const playFlipSound = () => {
        if (flipSoundRef.current && viewMode === 'page' && activeText.type !== 'special') {
          flipSoundRef.current.currentTime = 0;
          flipSoundRef.current.play().catch(() => {});
        }
      };

      const handleTouchEnd = () => {
        if (viewMode !== 'page' || !scrollContainerRef.current || activeText.type === 'special') return;
        
        if (touchTimeout.current) clearTimeout(touchTimeout.current);
        touchTimeout.current = setTimeout(() => {
          if (!scrollContainerRef.current) return;
          const container = scrollContainerRef.current;
          const width = container.clientWidth;
          const currentScroll = container.scrollLeft;
          const targetPage = Math.round(currentScroll / width);
          
          if (Math.abs(currentScroll - (targetPage * width)) > 5) {
             container.scrollTo({ left: targetPage * width, behavior: 'smooth' });
             playFlipSound();
          }
        }, 300); 
      };

      const turnPage = (direction) => {
        if (selectionMenu) setSelectionMenu(null);
        if (scrollContainerRef.current && activeText.type !== 'special') {
          const container = scrollContainerRef.current;
          const scrollAmount = container.clientWidth; 
          container.scrollBy({
            left: direction === 'next' ? scrollAmount : -scrollAmount,
            behavior: 'smooth'
          });
          playFlipSound(); 
        }
      };

      const handleZoomIn = () => setFontSize(prev => Math.min(prev + 2, 48));
      const handleZoomOut = () => setFontSize(prev => Math.max(prev - 2, 14));
      const handleLineSpacing = () => setLineSpacing(prev => prev === 1.2 ? 1.6 : prev === 1.6 ? 2.0 : 1.2);
      const toggleViewMode = () => setViewMode(prev => prev === 'scroll' ? 'page' : 'scroll');

      const toggleSpeech = () => {
        if (isPlaying) {
          window.speechSynthesis.cancel();
          setIsPlaying(false);
        } else {
          if (!activeText || !activeText.content || activeText.type === 'special') return;
          
          window.speechSynthesis.cancel();
          
          const utterance = new SpeechSynthesisUtterance(activeText.content);
          utterance.lang = 'pt-BR'; 
          utterance.onstart = () => setIsPlaying(true);
          utterance.onend = () => setIsPlaying(false);
          utterance.onerror = (e) => {
            console.error("Erro no áudio:", e);
            setIsPlaying(false);
          };
          
          utteranceRef.current = utterance;
          window.speechSynthesis.speak(utterance);
          setIsPlaying(true); 
        }
      };

      // === LÓGICA DO MARCA-TEXTOS (HIGHLIGHTS) ===
      
      const handleTextSelection = () => {
        setTimeout(() => {
          const selection = window.getSelection();
          if (!selection || selection.isCollapsed || !selection.toString().trim()) {
            if (selectionMenu) setSelectionMenu(null);
            return;
          }

          const wrapper = document.getElementById('text-content-wrapper');
          if (!wrapper || !wrapper.contains(selection.anchorNode)) return;

          // Calcula a posição exata da seleção no texto completo
          let start = 0, end = 0;
          const range = selection.getRangeAt(0);
          const preCaretRange = range.cloneRange();
          preCaretRange.selectNodeContents(wrapper);
          preCaretRange.setEnd(range.startContainer, range.startOffset);
          start = preCaretRange.toString().length;
          end = start + range.toString().length;

          const rect = range.getBoundingClientRect();
          
          setSelectionMenu({
            top: rect.top - 55, // Aparece logo acima da seleção
            left: rect.left + (rect.width / 2),
            start,
            end,
            text: selection.toString()
          });
        }, 150);
      };

      const addHighlight = (colorCode) => {
        if (!selectionMenu) return;
        const newHighlight = {
          id: Date.now(),
          start: selectionMenu.start,
          end: selectionMenu.end,
          text: selectionMenu.text,
          color: colorCode
        };

        setHighlights(prev => {
          const docHighlights = prev[activeTextId] || [];
          // Remove qualquer destaque que cruze com o novo para evitar erros de formatação
          const filtered = docHighlights.filter(h => h.end <= newHighlight.start || h.start >= newHighlight.end);
          return { ...prev, [activeTextId]: [...filtered, newHighlight] };
        });

        window.getSelection().removeAllRanges();
        setSelectionMenu(null);
      };

      const removeHighlight = (hlId) => {
        if(window.confirm("Deseja remover esta marcação?")) {
          setHighlights(prev => {
            const docHighlights = prev[activeTextId] || [];
            return { ...prev, [activeTextId]: docHighlights.filter(h => h.id !== hlId) };
          });
        }
      };

      const renderContentWithHighlights = () => {
        const text = activeText.content;
        if (!text) return null;

        const docHighlights = highlights[activeTextId] || [];
        if (docHighlights.length === 0) return text;

        // Ordena marcações pela ordem do texto
        const sorted = [...docHighlights].sort((a, b) => a.start - b.start);
        const elements = [];
        let lastIndex = 0;

        sorted.forEach((hl, i) => {
          if (hl.start > lastIndex) {
            elements.push(<span key={`t-${hl.id}`}>{text.substring(lastIndex, hl.start)}</span>);
          }
          const hlText = text.substring(Math.max(lastIndex, hl.start), hl.end);
          if (hlText) {
            elements.push(
              <mark 
                key={`m-${hl.id}`} 
                className={`${hl.color} text-inherit rounded px-1 cursor-pointer transition-colors hover:brightness-95 shadow-sm`}
                onClick={(e) => { e.stopPropagation(); removeHighlight(hl.id); }}
                title="Clique para remover a marcação"
              >
                {hlText}
              </mark>
            );
          }
          lastIndex = Math.max(lastIndex, hl.end);
        });

        if (lastIndex < text.length) {
          elements.push(<span key={`t-end`}>{text.substring(lastIndex)}</span>);
        }

        return elements;
      };

      const isSm = windowWidth >= 640;
      const pad = isSm ? 32 : 16;

      return (
        <div className={`min-h-[100dvh] flex transition-colors duration-500 ease-in-out ${currentTheme.classes}`}>
          
          {/* Popup Flutuante do Marca-Textos */}
          {selectionMenu && (
            <div 
              className="fixed z-[100] bg-zinc-800 text-white rounded-xl shadow-2xl flex items-center p-2 gap-2 animate-in zoom-in-95 duration-100"
              style={{ 
                  top: `${Math.max(10, selectionMenu.top)}px`, 
                  left: `${selectionMenu.left}px`, 
                  transform: 'translateX(-50%)' 
              }}
            >
              <button onClick={() => addHighlight('bg-yellow-300/80 dark:bg-yellow-500/60')} className="w-7 h-7 rounded-full bg-yellow-400 hover:scale-110 transition-transform shadow-sm"></button>
              <button onClick={() => addHighlight('bg-green-300/80 dark:bg-green-500/60')} className="w-7 h-7 rounded-full bg-green-400 hover:scale-110 transition-transform shadow-sm"></button>
              <button onClick={() => addHighlight('bg-pink-300/80 dark:bg-pink-500/60')} className="w-7 h-7 rounded-full bg-pink-400 hover:scale-110 transition-transform shadow-sm"></button>
              <div className="w-px h-6 bg-white/20 mx-1"></div>
              <button onClick={() => setSelectionMenu(null)} className="px-2 py-1 text-sm opacity-80 hover:opacity-100 active:scale-95">
                <i className="fas fa-times"></i>
              </button>
              {/* Seta do Balão */}
              <div className="absolute top-full left-1/2 -translate-x-1/2 border-[6px] border-transparent border-t-zinc-800"></div>
            </div>
          )}

          {/* Overlay Escuro para Mobile Sidebar */}
          <div 
            className={`fixed inset-0 bg-black/40 z-40 transition-opacity duration-300 md:hidden backdrop-blur-sm
              ${isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}
            onClick={() => setIsSidebarOpen(false)}
          ></div>

          {/* Menu Lateral (Sidebar) */}
          <aside 
            className={`fixed inset-y-0 left-0 z-50 w-4/5 max-w-[280px] md:relative md:max-w-none md:w-72 h-[100dvh] flex flex-col border-r backdrop-blur-xl transition-transform duration-300 ease-in-out ${currentTheme.panelClasses}
              ${isSidebarOpen ? 'translate-x-0 shadow-2xl md:shadow-none' : '-translate-x-full md:translate-x-0'}`}
          >
            <div className="p-4 md:p-5 flex items-center justify-between border-b border-inherit shrink-0">
              <div className="flex items-center gap-3 font-bold text-xl opacity-90">
                <i className="fas fa-bookmark text-xl"></i>
                <span>Menu de Lições</span>
              </div>
              <button 
                onClick={() => setIsSidebarOpen(false)} 
                className="md:hidden p-3 -mr-3 rounded-full hover:bg-black/10 active:scale-95 transition-all"
              >
                <i className="fas fa-times text-xl"></i>
              </button>
            </div>

            <div className="flex-1 overflow-y-auto p-4 pt-4 space-y-2 pb-24">
              {texts.map(text => (
                <div 
                  key={text.id}
                  onClick={() => {
                    setActiveTextId(text.id);
                    
                    // Reinicia a posição de leitura SE utilizador clicou no Menu (força a lição ir para o início)
                    setScrollPositions(prev => ({
                      ...prev,
                      [`${text.id}_scroll`]: 0,
                      [`${text.id}_page`]: 0
                    }));

                    if (scrollContainerRef.current) {
                      scrollContainerRef.current.scrollTop = 0;
                      scrollContainerRef.current.scrollLeft = 0;
                    }

                    if (isPlaying) { window.speechSynthesis.cancel(); setIsPlaying(false); }
                    if (window.innerWidth < 768) setIsSidebarOpen(false);
                  }}
                  className={`p-3.5 rounded-xl cursor-pointer transition-all flex justify-between items-center group
                    ${activeTextId === text.id ? 'bg-black/10 shadow-sm ring-1 ring-inherit font-bold' : 'hover:bg-black/5 active:bg-black/10'}
                    ${text.type === 'special' ? 'border border-current opacity-70 mt-4 mb-2' : ''}`}
                >
                  <span className="truncate pr-2 text-[15px]">
                    {text.type === 'special' ? text.title : (extractedTitles[text.id] || text.title)}
                  </span>
                  
                  {text.type !== 'special' && completedLessons.includes(text.id) && (
                    <i className="fas fa-check-circle text-green-500 text-lg shadow-sm rounded-full bg-white/30 backdrop-blur-sm"></i>
                  )}
                </div>
              ))}
            </div>
          </aside>

          {/* Conteúdo Principal */}
          <main className="flex-1 flex flex-col h-[100dvh] w-full min-w-0 overflow-hidden relative">
            
            {/* Barra de Ferramentas */}
            <header className={`p-2 sm:p-4 flex items-center justify-between border-b backdrop-blur-md z-30 shrink-0 ${currentTheme.panelClasses}`}>
              
              <div className="flex items-center gap-2 sm:gap-4 shrink-0 flex-1 min-w-0">
                <button 
                  onClick={() => setIsSidebarOpen(true)} 
                  className="p-3 rounded-xl hover:bg-black/10 active:scale-95 transition-all md:hidden shrink-0"
                >
                  <i className="fas fa-bars text-xl"></i>
                </button>
                <h1 className="font-bold text-sm sm:text-base md:text-lg opacity-90 uppercase tracking-widest truncate">
                  Lições de Vida Plena
                </h1>
              </div>

              <div className="flex items-center gap-1 sm:gap-2 shrink-0 relative ml-2 z-50">
                
                <button 
                  onClick={() => setShowSettings(!showSettings)}
                  className="p-3 rounded-full hover:bg-black/10 active:scale-90 transition-all shrink-0 ml-1 relative z-50"
                  title="Configurações"
                >
                  <i className={`fas fa-cog text-xl transition-transform duration-300 pointer-events-none ${showSettings ? 'rotate-90' : ''}`}></i>
                </button>
                
                {/* Menu de Configurações Dropdown */}
                {showSettings && (
                  <React.Fragment>
                    <div className="fixed inset-0 w-screen h-screen z-40" onClick={() => setShowSettings(false)}></div>
                    
                    <div className={`absolute right-0 top-full mt-3 p-5 rounded-3xl shadow-2xl border w-72 sm:w-80 z-50 origin-top-right animate-in fade-in zoom-in-95 duration-200 flex flex-col gap-6 ${currentTheme.solidMenuClasses}`}>
                      <div className="flex flex-col gap-3 relative z-50">
                        <span className="text-[11px] font-bold uppercase tracking-wider opacity-60">Tamanho e Espaçamento</span>
                        <div className="flex items-center justify-between bg-black/5 rounded-2xl p-1.5 shadow-inner">
                          <button onClick={handleZoomOut} className="p-3 rounded-xl hover:bg-black/10 flex-1 flex justify-center active:scale-95 transition-all"><i className="fas fa-search-minus text-lg"></i></button>
                          <div className="w-px h-6 bg-current opacity-10"></div>
                          <button onClick={handleLineSpacing} className="p-3 rounded-xl hover:bg-black/10 flex-1 flex justify-center active:scale-95 transition-all"><i className="fas fa-text-height text-lg"></i></button>
                          <div className="w-px h-6 bg-current opacity-10"></div>
                          <button onClick={handleZoomIn} className="p-3 rounded-xl hover:bg-black/10 flex-1 flex justify-center active:scale-95 transition-all"><i className="fas fa-search-plus text-lg"></i></button>
                        </div>
                      </div>

                      <div className="flex flex-col gap-3 relative z-50">
                        <span className="text-[11px] font-bold uppercase tracking-wider opacity-60">Modo de Leitura</span>
                        <button 
                          onClick={toggleViewMode} 
                          className="w-full flex items-center justify-between p-4 rounded-2xl bg-black/5 hover:bg-black/10 active:scale-95 transition-all font-semibold text-sm border border-transparent hover:border-black/5"
                        >
                          <span className="flex items-center gap-3">
                            <i className={`fas ${viewMode === 'scroll' ? 'fa-scroll' : 'fa-book-open'} text-lg opacity-80`}></i>
                            {viewMode === 'scroll' ? 'Rolagem Contínua' : 'Páginas (Kindle)'}
                          </span>
                          <i className="fas fa-sync-alt opacity-40"></i>
                        </button>
                      </div>

                      <div className="flex flex-col gap-3 relative z-50">
                        <span className="text-[11px] font-bold uppercase tracking-wider opacity-60">Cores / Temas</span>
                        <div className="grid grid-cols-3 gap-2">
                          {Object.values(themes).map(theme => (
                            <button
                              key={theme.id}
                              onClick={() => setCurrentTheme(theme)}
                              className={`flex flex-col items-center gap-2 p-3 rounded-2xl transition-all border border-transparent
                                ${currentTheme.id === theme.id ? 'bg-black/10 shadow-inner border-black/10' : 'hover:bg-black/5'}`}
                            >
                              <div className={`w-8 h-8 rounded-full shadow-md ${theme.preview}`}></div>
                              <span className="text-[10px] font-bold opacity-80">{theme.name}</span>
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  </React.Fragment>
                )}
              </div>
            </header>

            {/* Container Dinâmico de Leitura / Páginas Especiais */}
            <div className="flex-1 w-full relative flex overflow-hidden">
              
              {activeText.type === 'special' ? (
                <div className="w-full h-full overflow-y-auto">
                  {activeText.id === 'capa' ? (
                    <div className="flex flex-col items-center justify-center min-h-full text-center p-8 animate-in fade-in duration-1000">
                      <div className="max-w-xl w-full flex flex-col items-center border-[6px] border-double border-current p-10 sm:p-16 rounded-sm bg-black/5 backdrop-blur-sm shadow-2xl">
                        <i className="fas fa-seedling text-5xl sm:text-6xl mb-8 opacity-80"></i>
                        <h1 className="text-4xl sm:text-6xl font-black uppercase tracking-widest leading-tight opacity-90 mb-6">
                          Lições de<br/>Vida Plena
                        </h1>
                        <div className="w-32 h-1 bg-current opacity-40 mb-6"></div>
                        <p className="text-xl sm:text-2xl font-serif italic opacity-80">
                          Um guia para a sua evolução interior
                        </p>
                        <button 
                          onClick={() => {
                            setActiveTextId('prologo');
                            setScrollPositions(prev => ({ ...prev, ['prologo_scroll']: 0, ['prologo_page']: 0 }));
                          }}
                          className="mt-16 flex items-center gap-3 px-10 py-5 rounded-full font-bold shadow-lg bg-black/10 hover:bg-black/20 border-2 border-current active:scale-95 transition-all text-lg"
                        >
                          Começar a Ler <i className="fas fa-arrow-right"></i>
                        </button>
                      </div>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center justify-center min-h-full text-center p-8 animate-in fade-in duration-1000">
                      <div className="max-w-2xl w-full flex flex-col items-center p-8">
                        <div className="w-40 h-40 rounded-full bg-black/10 flex items-center justify-center mb-6 shadow-xl border-4 border-current overflow-hidden">
                           <i className="fas fa-user-edit text-6xl opacity-50"></i>
                        </div>
                        <h2 className="text-4xl font-black uppercase tracking-wider opacity-90 mb-2">Nome do Autor</h2>
                        <h3 className="text-lg uppercase tracking-widest opacity-60 mb-8">Escritor & Pensador</h3>
                        
                        <p className="text-lg sm:text-xl font-serif text-justify leading-relaxed opacity-85">
                          Este é o espaço reservado para a sua biografia. Fale um pouco sobre a sua jornada, as suas motivações para escrever as "Lições de Vida Plena" e o que espera despertar no coração dos seus leitores.
                          <br/><br/>
                          Sinta-se à vontade para editar este texto no código do arquivo sempre que pretender.
                        </p>
                      </div>
                    </div>
                  )}
                </div>
              ) : (
                <React.Fragment>
                  {viewMode === 'page' && !isLoading && (
                    <div className="absolute inset-0 pointer-events-none flex justify-between z-10 pb-8">
                      <button onClick={() => turnPage('prev')} className="pointer-events-auto h-full w-16 sm:w-28 flex items-center justify-start pl-2 sm:pl-6 text-current opacity-10 hover:opacity-40 transition-opacity active:opacity-60">
                        <i className="fas fa-chevron-left text-5xl sm:text-7xl"></i>
                      </button>
                      <button onClick={() => turnPage('next')} className="pointer-events-auto h-full w-16 sm:w-28 flex items-center justify-end pr-2 sm:pr-6 text-current opacity-10 hover:opacity-40 transition-opacity active:opacity-60">
                        <i className="fas fa-chevron-right text-5xl sm:text-7xl"></i>
                      </button>
                    </div>
                  )}

                  <div 
                    ref={scrollContainerRef}
                    onScroll={handleScroll}
                    onTouchEnd={handleTouchEnd}
                    className={`flex-1 w-full h-full relative scroll-smooth
                      ${viewMode === 'scroll' ? 'overflow-y-auto overflow-x-hidden hide-scrollbar' : 'overflow-x-auto overflow-y-hidden hide-scrollbar-completely'}`}
                  >
                    <div className={`mx-auto w-full ${viewMode === 'scroll' ? 'max-w-3xl p-4 sm:p-6 md:p-12 pb-32' : 'h-full'}`}>
                      
                      {isLoading ? (
                        <div className="flex flex-col items-center justify-center h-full opacity-60 pt-20">
                          <div className="loader mb-4"></div>
                          <p className="font-bold tracking-widest uppercase text-sm">Carregando Lição...</p>
                        </div>
                      ) : activeText && (
                        <article 
                          className="w-full break-words transition-all duration-300 relative"
                          style={viewMode === 'page' ? {
                            columnWidth: `calc(100vw - ${pad * 2}px)`,
                            columnGap: `${pad * 2}px`,
                            height: '100%', 
                            padding: `24px ${pad}px 40px ${pad}px`, 
                            boxSizing: 'border-box'
                          } : { paddingBottom: '120px' }}
                        >
                          <h2 
                            className="font-bold mb-6 sm:mb-8 leading-tight opacity-90"
                            style={{ fontSize: `${fontSize * 1.4}px`, breakAfter: 'avoid' }}
                          >
                            {extractedTitles[activeText.id] || activeText.title}
                          </h2>
                          
                          {/* Área Textual que suporta seleção do utilizador */}
                          <div 
                            id="text-content-wrapper"
                            className="opacity-85 whitespace-pre-wrap font-serif text-justify"
                            style={{ fontSize: `${fontSize}px`, lineHeight: lineSpacing }}
                            onMouseUp={handleTextSelection}
                            onTouchEndCapture={handleTextSelection} // Captura no mobile logo que o dedo levanta do texto
                          >
                            {renderContentWithHighlights()}
                          </div>

                          <div className="mt-16 mb-8 flex justify-center w-full" style={{ breakInside: 'avoid', pageBreakInside: 'avoid' }}>
                            <button
                              onClick={() => toggleLessonCompletion(activeText.id)}
                              className={`flex items-center gap-3 px-6 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95 border-2 z-20 relative
                                ${completedLessons.includes(activeText.id) 
                                  ? 'bg-green-600/90 text-white border-green-500 hover:bg-green-700' 
                                  : 'bg-black/10 border-current hover:bg-black/20'}`}
                            >
                              <i className={`fas ${completedLessons.includes(activeText.id) ? 'fa-check-double' : 'fa-check'}`}></i>
                              {completedLessons.includes(activeText.id) ? 'Lição Concluída!' : 'Marcar como Concluído'}
                            </button>
                          </div>
                        </article>
                      )}
                    </div>
                  </div>

                  {/* Numeração de Página */}
                  {viewMode === 'page' && !isLoading && (
                    <div className="absolute bottom-2 left-0 right-0 w-full text-center pointer-events-none z-20">
                      <span className="bg-black/10 backdrop-blur-sm px-4 py-1.5 rounded-full text-[10px] sm:text-xs font-bold opacity-60 tracking-wider">
                        {extractedTitles[activeText.id] || activeText.title} • Pág {pageInfo.current} de {pageInfo.total}
                      </span>
                    </div>
                  )}
                  
                </React.Fragment>
              )}
            </div>
            
            {/* Botão de Áudio Flutuante Fixo e Pequeno na Base da Tela */}
            {activeText.type !== 'special' && !isLoading && (
              <button
                onClick={toggleSpeech}
                className={`fixed bottom-12 right-4 sm:bottom-12 sm:right-8 z-[90] flex items-center justify-center gap-2 px-3 py-2 rounded-full shadow-lg border border-current transition-all active:scale-90
                  ${isPlaying ? 'bg-red-600/90 text-white border-red-500 animate-pulse' : 'bg-black/20 hover:bg-black/30 backdrop-blur-md'}`}
                title={isPlaying ? 'Parar Áudio' : 'Ouvir Lição'}
              >
                <i className={`fas ${isPlaying ? 'fa-square' : 'fa-headphones'} text-xs pointer-events-none`}></i>
                <span className="text-[10px] font-bold uppercase tracking-wider pointer-events-none">
                  {isPlaying ? 'Parar' : 'Ouvir'}
                </span>
              </button>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
